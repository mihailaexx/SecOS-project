---
- name: Install packages
  ansible.builtin.dnf:
    name:
      - nfs-utils
      - mdadm
      - cronie
      - xfsprogs
      - policycoreutils-python-utils
      - python3-libselinux
      - python3-libsemanage
    state: present

- name: Create RAID1 array from sdb + sdc
  ansible.builtin.command: mdadm --create /dev/md0 --level=1 --raid-devices=2 --run /dev/vdb /dev/vdc
  args:
    creates: /dev/md0

- name: Format RAID array with XFS
  community.general.filesystem:
    fstype: xfs
    dev: /dev/md0

- name: Mount RAID array at /export/home
  ansible.posix.mount:
    path: /export/home
    src: /dev/md0
    fstype: xfs
    state: mounted

# Stock Fedora ships an empty/comment-only /etc/mdadm.conf, so a plain
# `creates: /etc/mdadm.conf` short-circuits before the scan ever runs.
# Detect missing ARRAY entries instead and only rewrite when needed.
- name: Check mdadm.conf for ARRAY entries
  ansible.builtin.command: grep -q '^ARRAY' /etc/mdadm.conf
  register: mdadm_conf_has_array
  failed_when: false
  changed_when: false

- name: Save mdadm configuration
  ansible.builtin.shell: mdadm --detail --scan > /etc/mdadm.conf
  when: mdadm_conf_has_array.rc != 0
  changed_when: true

- name: Set /export/home permissions
  ansible.builtin.file:
    path: /export/home
    mode: "0755"

- name: Create user home directories
  ansible.builtin.file:
    path: "/export/home/{{ item.name }}"
    state: directory
    owner: "{{ item.uid }}"
    group: "{{ item.gid }}"
    mode: "0700"
  loop:
    - { name: m.bulushev, uid: "2010", gid: "2000" }
    - { name: admin1, uid: "2011", gid: "2001" }
    - { name: dba1, uid: "2012", gid: "2002" }

- name: Create backup directories
  ansible.builtin.file:
    path: "/export/backups/{{ item }}"
    state: directory
  loop:
    - postgres
    - ldap
    - keycloak
    - configs
    - homes

# postgres on test-server runs the backup-postgres cron as the postgres
# user (uid 26). NFS uses numeric uids, so the dir must be writable by
# uid 26 — postgres user does not exist on storage-node.
- name: Ensure postgres backup dir is writable by uid 26 (postgres on test-server)
  ansible.builtin.file:
    path: /export/backups/postgres
    state: directory
    owner: "26"
    group: "26"
    mode: "0755"

# ── SELinux file contexts on exported trees ──
# Pin labels so SELinux blocks cross-service access even if DAC is subverted.
# Bastions inherit these labels via NFSv4 security_label (see exports.j2 +
# autofs/mount opts on the clients).
- name: Pin SELinux file contexts on /export trees
  community.general.sefcontext:
    target: "{{ item.target }}"
    setype: "{{ item.setype }}"
    state: present
  loop:
    - { target: '/export/home(/.*)?',        setype: user_home_dir_t }
    - { target: '/export/home/[^/]+/.*',     setype: user_home_t }
    - { target: '/export/backups(/.*)?',     setype: public_content_t }
  register: storage_fcontext

- name: Apply file contexts to existing files
  ansible.builtin.command: restorecon -RFv /export/home /export/backups
  when: storage_fcontext.changed
  changed_when: true

- name: Configure NFS exports
  ansible.builtin.template:
    src: exports.j2
    dest: /etc/exports
    owner: root
    group: root
    mode: "0644"
  notify: reload nfs

- name: Enable and start NFS server
  ansible.builtin.systemd:
    name: nfs-server
    enabled: true
    state: started

- name: Weekly home backup cron
  ansible.builtin.cron:
    name: backup-homes
    minute: "0"
    hour: "2"
    weekday: "0"
    user: root
    job: >-
      tar czf /export/backups/homes/homes-$(date +\%F).tar.gz -C / export/home/
      && find /export/backups/homes/ -name "*.tar.gz" -mtime +7 -delete

- name: Enable crond
  ansible.builtin.systemd:
    name: crond
    enabled: true
    state: started

- name: Install firewalld
  ansible.builtin.dnf:
    name: firewalld
    state: present

- name: Deploy firewalld zone
  ansible.builtin.template:
    src: firewalld-internal-bastion.xml.j2
    dest: /etc/firewalld/zones/internal-bastion.xml
  notify: reload firewalld

- name: Enable and start firewalld
  ansible.builtin.systemd:
    name: firewalld
    enabled: true
    state: started
