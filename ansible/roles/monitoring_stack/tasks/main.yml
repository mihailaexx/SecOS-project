---
# Runs as the unprivileged `secos` user provisioned by container_runtime.
# All state lives under /home/secos/secos/monitoring/ so podman storage,
# bind-mounted configs, and the systemd user unit share one ownership domain.

- name: Remove legacy rootful monitoring unit (if upgrading from previous deploy)
  systemd:
    name: secos-monitoring
    state: stopped
    enabled: false
  failed_when: false

- name: Remove legacy rootful unit file
  file:
    path: /etc/systemd/system/secos-monitoring.service
    state: absent

- name: Remove legacy /etc/secos monitoring config tree
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/secos/prometheus
    - /etc/secos/loki
    - /etc/secos/grafana
    - /opt/secos/monitoring

- name: Create rootless config tree under secos $HOME
  file:
    path: "{{ item }}"
    state: directory
    owner: secos
    group: secos
    mode: "0755"
  loop:
    - /home/secos/secos/monitoring
    - /home/secos/secos/monitoring/prometheus
    - /home/secos/secos/monitoring/loki
    - /home/secos/secos/monitoring/grafana
    - /home/secos/secos/monitoring/grafana/dashboards

- name: Deploy Prometheus scrape config
  template:
    src: prometheus.yml.j2
    dest: /home/secos/secos/monitoring/prometheus/prometheus.yml
    owner: secos
    group: secos
    mode: "0644"
  notify: restart monitoring

- name: Deploy Loki config
  copy:
    src: loki.yml
    dest: /home/secos/secos/monitoring/loki/config.yml
    owner: secos
    group: secos
    mode: "0644"
  notify: restart monitoring

- name: Deploy Grafana datasources
  copy:
    src: datasources.yml
    dest: /home/secos/secos/monitoring/grafana/datasources.yml
    owner: secos
    group: secos
    mode: "0644"
  notify: restart monitoring

- name: Deploy Grafana dashboards provider
  copy:
    src: dashboards-provider.yml
    dest: /home/secos/secos/monitoring/grafana/dashboards-provider.yml
    owner: secos
    group: secos
    mode: "0644"
  notify: restart monitoring

- name: Deploy Grafana dashboards
  copy:
    src: node-overview.json
    dest: /home/secos/secos/monitoring/grafana/dashboards/node-overview.json
    owner: secos
    group: secos
    mode: "0644"
  notify: restart monitoring

- name: Generate Grafana admin password
  copy:
    content: "{{ lookup('password', '/tmp/secos-grafana-admin-password length=24 chars=ascii_letters,digits') }}"
    dest: /home/secos/secos/monitoring/grafana/admin_password
    owner: secos
    group: secos
    mode: "0400"
  no_log: true

- name: Deploy compose file
  copy:
    src: "{{ playbook_dir }}/../containers/monitoring/compose.yml"
    dest: /home/secos/secos/monitoring/compose.yml
    owner: secos
    group: secos
    mode: "0644"
  notify: restart monitoring

- name: Install monitoring systemd user unit
  copy:
    src: secos-monitoring.service
    dest: /home/secos/.config/systemd/user/secos-monitoring.service
    owner: secos
    group: secos
    mode: "0644"
  notify:
    - daemon reload monitoring
    - restart monitoring

- name: Enable and start monitoring stack (rootless)
  become: true
  become_user: secos
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ secos_uid }}"
  systemd:
    name: secos-monitoring
    enabled: true
    state: started
    scope: user
    daemon_reload: true
