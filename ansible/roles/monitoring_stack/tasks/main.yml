---
# Runs as the unprivileged `secos` user provisioned by container_runtime.
# All state lives under /var/lib/secos/secos/monitoring/ so podman storage,
# bind-mounted configs, and the systemd user unit share one ownership domain.

- name: Remove legacy rootful monitoring unit (if upgrading from previous deploy)
  ansible.builtin.systemd:
    name: secos-monitoring
    state: stopped
    enabled: false
  failed_when: false

- name: Remove legacy rootful unit file
  ansible.builtin.file:
    path: /etc/systemd/system/secos-monitoring.service
    state: absent

- name: Remove legacy /etc/secos monitoring config tree
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/secos/prometheus
    - /etc/secos/loki
    - /etc/secos/grafana
    - /opt/secos/monitoring

- name: Create rootless config tree under secos $HOME
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: secos
    group: secos
    mode: "0755"
  loop:
    - /var/lib/secos/secos/monitoring
    - /var/lib/secos/secos/monitoring/prometheus
    - /var/lib/secos/secos/monitoring/loki
    - /var/lib/secos/secos/monitoring/grafana
    - /var/lib/secos/secos/monitoring/grafana/dashboards

- name: Deploy Prometheus scrape config
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: /var/lib/secos/secos/monitoring/prometheus/prometheus.yml
    owner: secos
    group: secos
    mode: "0644"
  notify: restart monitoring

- name: Deploy Loki config
  ansible.builtin.copy:
    src: loki.yml
    dest: /var/lib/secos/secos/monitoring/loki/config.yml
    owner: secos
    group: secos
    mode: "0644"
  notify: restart monitoring

- name: Deploy Grafana datasources
  ansible.builtin.copy:
    src: datasources.yml
    dest: /var/lib/secos/secos/monitoring/grafana/datasources.yml
    owner: secos
    group: secos
    mode: "0644"
  notify: restart monitoring

- name: Deploy Grafana dashboards provider
  ansible.builtin.copy:
    src: dashboards-provider.yml
    dest: /var/lib/secos/secos/monitoring/grafana/dashboards-provider.yml
    owner: secos
    group: secos
    mode: "0644"
  notify: restart monitoring

- name: Deploy Grafana dashboards
  ansible.builtin.copy:
    src: node-overview.json
    dest: /var/lib/secos/secos/monitoring/grafana/dashboards/node-overview.json
    owner: secos
    group: secos
    mode: "0644"
  notify: restart monitoring

- name: Generate Grafana admin password
  ansible.builtin.copy:
    content: "{{ lookup('password', secos_password_cache_dir ~ '/grafana-admin-password length=24 chars=ascii_letters,digits') }}"
    dest: /var/lib/secos/secos/monitoring/grafana/admin_password
    owner: secos
    group: secos
    mode: "0400"
  no_log: true

- name: Deploy compose file
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../containers/monitoring/compose.yml"
    dest: /var/lib/secos/secos/monitoring/compose.yml
    owner: secos
    group: secos
    mode: "0644"
  notify: restart monitoring

- name: Install monitoring systemd user unit
  ansible.builtin.copy:
    src: secos-monitoring.service
    dest: /var/lib/secos/.config/systemd/user/secos-monitoring.service
    owner: secos
    group: secos
    mode: "0644"
  notify:
    - daemon reload monitoring
    - restart monitoring

- name: Enable and start monitoring stack (rootless)
  become: true
  become_user: secos
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ secos_uid }}"
  ansible.builtin.systemd:
    name: secos-monitoring
    enabled: true
    state: started
    scope: user
    daemon_reload: true
