---
- name: Install HAProxy
  ansible.builtin.dnf:
    name: haproxy
    state: present

- name: Deploy HAProxy configuration
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    owner: root
    group: haproxy
    mode: "0640"
    validate: "haproxy -c -f %s"
  notify: restart haproxy

- name: Install Python SELinux bindings
  ansible.builtin.dnf:
    name:
      - python3-libselinux
      - python3-libsemanage
    state: present

- name: Allow HAProxy to connect to any port (SELinux)
  ansible.posix.seboolean:
    name: haproxy_connect_any
    state: true
    persistent: true

- name: Enable and start HAProxy
  ansible.builtin.systemd:
    name: haproxy
    enabled: true
    state: started

# ── Firewall ──
- name: Install firewalld
  ansible.builtin.dnf:
    name: firewalld
    state: present

- name: Deploy firewalld public zone
  ansible.builtin.template:
    src: firewalld-public.xml.j2
    dest: /etc/firewalld/zones/public.xml
  notify: reload firewalld

- name: Enable and start firewalld
  ansible.builtin.systemd:
    name: firewalld
    enabled: true
    state: started

# ── Backups ──
- name: Install NFS utils and cronie
  ansible.builtin.dnf:
    name:
      - nfs-utils
      - cronie
    state: present

- name: Mount NFS backup share
  ansible.posix.mount:
    path: /mnt/backups
    src: "{{ secos_storage_ip }}:/export/backups"
    fstype: nfs
    opts: "{{ secos_nfs_mount_opts }}"
    state: mounted

- name: Daily config backup cron
  ansible.builtin.cron:
    name: backup-configs
    minute: "0"
    hour: "3"
    user: root
    job: >-
      mkdir -p /mnt/backups/configs/lb-node
      && rsync -a /etc/ /mnt/backups/configs/lb-node/

- name: Enable crond
  ansible.builtin.systemd:
    name: crond
    enabled: true
    state: started
