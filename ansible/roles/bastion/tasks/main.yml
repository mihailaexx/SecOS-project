---
- name: Install packages
  dnf:
    name:
      - nfs-utils
      - sssd
      - sssd-ldap
      - oddjob-mkhomedir
      - autofs
      - cronie
      - policycoreutils-python-utils
      - checkpolicy
      - selinux-policy-devel
      - setools-console
      - make
    state: present

# ── SSHD config (deploy FIRST to keep ansible auth alive through authselect) ──
- name: Deploy sshd bastion auth drop-in
  template:
    src: 40-bastion-auth.conf.j2
    dest: /etc/ssh/sshd_config.d/40-bastion-auth.conf
  register: sshd_dropin

- name: Fix SELinux context on sshd drop-in
  command: restorecon -v /etc/ssh/sshd_config.d/40-bastion-auth.conf
  changed_when: false

- name: Validate sshd config
  command: sshd -t
  changed_when: false
  when: sshd_dropin.changed

- name: Restart sshd to activate ansible auth early
  systemd:
    name: sshd
    state: restarted
  when: sshd_dropin.changed

- name: Reset SSH connection after sshd restart
  meta: reset_connection
  when: sshd_dropin.changed

# ── AutoFS for NFS home directories ──
- name: Deploy autofs master config
  copy:
    src: home.autofs
    dest: /etc/auto.master.d/home.autofs
  notify: restart autofs

- name: Deploy autofs home map
  copy:
    src: auto.home
    dest: /etc/auto.home
  notify: restart autofs

- name: Enable and start autofs
  systemd:
    name: autofs
    enabled: true
    state: started

# ── SSSD (LDAP user/group resolution) ──
- name: Deploy SSSD configuration
  template:
    src: sssd.conf.j2
    dest: /etc/sssd/sssd.conf
    mode: "0600"
  notify: restart sssd

- name: Enable and start SSSD
  systemd:
    name: sssd
    enabled: true
    state: started

- name: Configure authselect with SSSD and mkhomedir
  command: authselect select sssd with-mkhomedir --force
  changed_when: false

# Deploy PAM sshd config immediately after authselect (before connection drops)
- name: Deploy PAM sshd config
  template:
    src: sshd-pam.j2
    dest: /etc/pam.d/sshd
  notify: restart sshd

- name: Reset SSH connection after PAM changes
  meta: reset_connection

- name: Enable and start oddjobd
  systemd:
    name: oddjobd
    enabled: true
    state: started

# ── pam-keycloak-oidc ──
- name: Create pam-keycloak-oidc directory
  file:
    path: /opt/pam-keycloak-oidc
    state: directory

- name: Deploy pam-keycloak-oidc binary (pre-staged on controller)
  copy:
    src: "{{ playbook_dir }}/files/cache/pam-keycloak-oidc.linux-amd64"
    dest: /opt/pam-keycloak-oidc/pam-keycloak-oidc
    mode: "0755"

- name: Deploy pam-keycloak-oidc config
  template:
    src: pam-keycloak-oidc.tml.j2
    dest: /opt/pam-keycloak-oidc/pam-keycloak-oidc.tml

# ── SELinux policy for pam-keycloak-oidc ──
# Custom restricted policy:
#   * dedicated domain pam_keycloak_oidc_t (no permissive statement)
#   * three file types: _exec_t, _conf_t, _log_t
#   * custom port type pam_keycloak_oidc_port_t (no piggybacking on http_cache_port_t)
- name: Create SELinux build directory for pam-keycloak-oidc
  file:
    path: /var/lib/selinux-build/pam_keycloak_oidc
    state: directory
    mode: "0755"

- name: Stage SELinux policy sources (.te + .fc)
  copy:
    src: "{{ item }}"
    dest: "/var/lib/selinux-build/pam_keycloak_oidc/{{ item }}"
  loop:
    - pam_keycloak_oidc.te
    - pam_keycloak_oidc.fc
  register: selinux_src

- name: Build SELinux policy module via refpolicy devel Makefile
  command: make -f /usr/share/selinux/devel/Makefile pam_keycloak_oidc.pp
  args:
    chdir: /var/lib/selinux-build/pam_keycloak_oidc
  when: selinux_src.changed
  changed_when: true

- name: Install SELinux policy module
  command: semodule -i /var/lib/selinux-build/pam_keycloak_oidc/pam_keycloak_oidc.pp
  when: selinux_src.changed
  changed_when: true

# Bind the custom port type to 8080/tcp (Keycloak)
- name: Label Keycloak TCP port 8080 as pam_keycloak_oidc_port_t
  community.general.seport:
    ports: 8080
    proto: tcp
    setype: pam_keycloak_oidc_port_t
    state: present

# Ensure log file exists so the file-context rule can label it
- name: Pre-create pam-keycloak-oidc log file
  file:
    path: /var/log/pam-keycloak-oidc.log
    state: touch
    owner: root
    group: root
    mode: "0640"
  changed_when: false

- name: Apply file contexts for pam-keycloak-oidc paths
  command: restorecon -RFv /opt/pam-keycloak-oidc /var/log/pam-keycloak-oidc.log
  changed_when: false

# ── Groups ──
- name: Create groups
  group:
    name: "{{ item.name }}"
    gid: "{{ item.gid }}"
  loop:
    - { name: bastion-users, gid: 2000 }
    - { name: bastion-admins, gid: 2001 }
    - { name: dba, gid: 2002 }

# ── Users (no home dirs — they live on NFS via autofs) ──
- name: Create user m.bulushev
  user:
    name: m.bulushev
    uid: 1001
    group: bastion-users
    groups: bastion-users
    shell: /bin/bash
    create_home: false

- name: Create user admin1
  user:
    name: admin1
    uid: 1002
    group: bastion-admins
    groups: bastion-users,bastion-admins
    shell: /bin/bash
    create_home: false

- name: Create user dba1
  user:
    name: dba1
    uid: 1003
    group: dba
    groups: bastion-users,dba
    shell: /bin/bash
    create_home: false

# ── SELinux user / role mapping for human accounts on bastions ──
# m.bulushev → user_u (user_r only, cannot reach sysadm_r even via sudo)
# admin1     → staff_u (the global play extends staff_u with sysadm_r,
#              so `sudo -i` lands in sysadm_t)
- name: Map bastion logins to SELinux users
  community.general.selogin:
    login: "{{ item.login }}"
    seuser: "{{ item.seuser }}"
    state: present
  loop:
    - { login: m.bulushev, seuser: user_u }
    - { login: admin1,     seuser: staff_u }

# ── Sudoers ──
- name: Deploy bastion-admins sudoers
  copy:
    content: |
      %bastion-admins ALL=(root) /usr/bin/systemctl restart sssd
      %bastion-admins ALL=(root) /usr/bin/systemctl restart haproxy
      %bastion-admins ALL=(root) /usr/sbin/exportfs -ra
    dest: /etc/sudoers.d/bastion-admins
    mode: "0440"
    validate: "visudo -cf %s"

# Flush pending sshd restart handler before firewall changes
- name: Flush handlers
  meta: flush_handlers

- name: Reset SSH connection after sshd restart
  meta: reset_connection

# ── Firewall ──
- name: Install firewalld
  dnf:
    name: firewalld
    state: present

- name: Deploy firewalld public zone
  template:
    src: firewalld-public.xml.j2
    dest: /etc/firewalld/zones/public.xml
  notify: reload firewalld

- name: Enable and start firewalld
  systemd:
    name: firewalld
    enabled: true
    state: started

# ── Backups ──
- name: Mount NFS backup share
  mount:
    path: /mnt/backups
    src: "192.168.56.50:/export/backups"
    fstype: nfs4
    opts: _netdev,defaults,security=selinux
    state: mounted

- name: Daily config backup cron
  cron:
    name: backup-configs
    minute: "0"
    hour: "3"
    user: root
    job: >-
      mkdir -p /mnt/backups/configs/{{ inventory_hostname }}
      && rsync -a /etc/ /mnt/backups/configs/{{ inventory_hostname }}/

- name: Enable crond
  systemd:
    name: crond
    enabled: true
    state: started
