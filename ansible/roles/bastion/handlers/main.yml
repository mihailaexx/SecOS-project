---
- name: restart autofs
  ansible.builtin.systemd:
    name: autofs
    state: restarted

- name: restart sssd
  ansible.builtin.systemd:
    name: sssd
    state: restarted

- name: validate sshd config
  ansible.builtin.command: sshd -t
  listen: restart sshd

- name: restart sshd
  ansible.builtin.systemd:
    name: sshd
    state: restarted

- name: reload firewalld
  ansible.builtin.systemd:
    name: firewalld
    state: reloaded
