---
# Runs as the unprivileged `secos` user. promtail reads systemd journals via
# secos's membership in the `systemd-journal` group (set up in container_runtime).
# Caveat: node-exporter loses a few host-PID-only collectors (e.g. mountinfo
# from /host/proc/1) because the rootless user namespace can't ptrace PID 1.
# Filesystem-size metrics from the container's own /proc still work; per-pid
# host metrics do not.

- name: Remove legacy rootful agents unit
  ansible.builtin.systemd:
    name: secos-agents
    state: stopped
    enabled: false
  failed_when: false

- name: Remove legacy rootful agents unit file
  ansible.builtin.file:
    path: /etc/systemd/system/secos-agents.service
    state: absent

- name: Remove legacy /etc/secos agents config tree
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/secos/promtail
    - /opt/secos/agents

- name: Create rootless agents config tree under secos $HOME
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: secos
    group: secos
    mode: "0755"
  loop:
    - /var/lib/secos/secos/agents
    - /var/lib/secos/secos/agents/promtail

- name: Deploy Promtail config
  ansible.builtin.template:
    src: promtail-config.yml.j2
    dest: /var/lib/secos/secos/agents/promtail/config.yml
    owner: secos
    group: secos
    mode: "0644"
  notify: restart agents

- name: Deploy compose file
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../containers/agents/compose.yml"
    dest: /var/lib/secos/secos/agents/compose.yml
    owner: secos
    group: secos
    mode: "0644"
  notify: restart agents

- name: Deploy compose env file
  ansible.builtin.template:
    src: agents.env.j2
    dest: /var/lib/secos/secos/agents/.env
    owner: secos
    group: secos
    mode: "0644"
  notify: restart agents

- name: Install agents systemd user unit
  ansible.builtin.template:
    src: secos-agents.service.j2
    dest: /var/lib/secos/.config/systemd/user/secos-agents.service
    owner: secos
    group: secos
    mode: "0644"
  notify:
    - daemon reload agents
    - restart agents

- name: Gather service facts (for firewalld detection)
  ansible.builtin.service_facts:
- name: Open node_exporter port on all active firewalld zones
  ansible.builtin.shell: |
    set -o pipefail
    zones=$(firewall-cmd --get-active-zones | awk 'NR%2==1')
    for z in $zones; do
      firewall-cmd --permanent --zone=$z --add-port=9100/tcp
    done
    firewall-cmd --reload
  changed_when: false
  when: ansible_facts.services['firewalld.service'].state | default('stopped') == 'running'

- name: Enable and start agents stack (rootless)
  become: true
  become_user: secos
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ secos_uid }}"
  ansible.builtin.systemd:
    name: secos-agents
    enabled: true
    state: started
    scope: user
    daemon_reload: true
