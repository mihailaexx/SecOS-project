---
- name: Create node_exporter system user
  user:
    name: node_exporter
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Download node_exporter binary
  get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.{{ node_exporter_arch }}.tar.gz"
    dest: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
  register: node_exporter_download

- name: Extract node_exporter binary
  unarchive:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    dest: /tmp
    remote_src: true
  when: node_exporter_download.changed

- name: Install node_exporter binary
  copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.{{ node_exporter_arch }}/node_exporter"
    dest: /usr/local/bin/node_exporter
    remote_src: true
    owner: root
    group: root
    mode: "0755"
  notify: restart node_exporter

- name: Deploy node_exporter systemd unit
  template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
  notify:
    - daemon reload
    - restart node_exporter

- name: List active firewalld zones
  command: firewall-cmd --get-active-zones
  register: active_zones
  changed_when: false
  failed_when: false

- name: Open node_exporter port in every active zone
  firewalld:
    port: 9100/tcp
    permanent: true
    state: enabled
    immediate: true
    zone: "{{ item }}"
  loop: >-
    {{ active_zones.stdout_lines
       | reject('match','^\\s')
       | reject('equalto','')
       | list }}
  when: active_zones.rc == 0
  ignore_errors: true

- name: Enable and start node_exporter
  systemd:
    name: node_exporter
    enabled: true
    state: started
