---
# auditd refuses systemctl restart and the legacy `service auditd restart`
# wrapper times out on Fedora. SIGHUP makes auditd reread auditd.conf and
# reload plugins.d/, which is what we actually need when those files change.
- name: restart auditd
  command: /usr/sbin/service auditd reload
  changed_when: true

- name: reload audit rules
  command: /usr/sbin/augenrules --load
  changed_when: true
