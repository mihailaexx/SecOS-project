---
- name: Create promtail system user (with journal access)
  user:
    name: promtail
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    groups: systemd-journal
    append: true

- name: Create promtail directories
  file:
    path: "{{ item }}"
    state: directory
    owner: promtail
    group: promtail
    mode: "0755"
  loop:
    - /etc/promtail
    - /var/lib/promtail

- name: Download promtail binary
  get_url:
    url: "https://github.com/grafana/loki/releases/download/v{{ promtail_version }}/promtail-{{ promtail_arch }}.zip"
    dest: "/tmp/promtail-{{ promtail_version }}.zip"
  register: promtail_download

- name: Install unzip
  dnf:
    name: unzip
    state: present

- name: Extract promtail binary
  command: unzip -o /tmp/promtail-{{ promtail_version }}.zip -d /tmp/promtail-extract
  args:
    creates: /tmp/promtail-extract/promtail-{{ promtail_arch }}
  when: promtail_download.changed

- name: Install promtail binary
  copy:
    src: "/tmp/promtail-extract/promtail-{{ promtail_arch }}"
    dest: /usr/local/bin/promtail
    remote_src: true
    owner: root
    group: root
    mode: "0755"
  notify: restart promtail

- name: Deploy promtail configuration
  template:
    src: promtail-config.yml.j2
    dest: /etc/promtail/config.yml
    owner: promtail
    group: promtail
  notify: restart promtail

- name: Deploy promtail systemd unit
  template:
    src: promtail.service.j2
    dest: /etc/systemd/system/promtail.service
  notify:
    - daemon reload
    - restart promtail

- name: Wait for Loki /ready before starting promtail
  uri:
    url: "http://{{ hostvars[groups['storage'][0]].ansible_host }}:3100/ready"
    status_code: 200
  register: loki_ready
  retries: 30
  delay: 5
  until: loki_ready.status == 200

- name: Enable and start promtail
  systemd:
    name: promtail
    enabled: true
    state: started
