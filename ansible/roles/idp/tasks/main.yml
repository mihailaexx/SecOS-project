---
# ── Remove legacy native install (if upgrading from pre-containerized deployment) ──
- name: Stop + disable legacy slapd
  systemd:
    name: slapd
    state: stopped
    enabled: false
  failed_when: false

- name: Stop + disable legacy keycloak
  systemd:
    name: keycloak
    state: stopped
    enabled: false
  failed_when: false

- name: Remove legacy openldap-servers package
  dnf:
    name:
      - openldap-servers
    state: absent
  failed_when: false

- name: Remove legacy keycloak install dir + unit file
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /opt/keycloak
    - /etc/systemd/system/keycloak.service

# ── Config tree ──
- name: Create /etc/secos IdP config tree
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/secos
    - /etc/secos/openldap
    - /etc/secos/openldap/ldifs
    - /etc/secos/keycloak
    - /etc/secos/keycloak/import
    - /opt/secos/idp
    - /opt/secos/bin
    - /mnt/backups

# ── OpenLDAP container config ──
- name: Deploy OpenLDAP LDIF (container-compatible)
  copy:
    src: ldap-container.ldif
    dest: /etc/secos/openldap/ldifs/01-users.ldif
    mode: "0644"
  notify: restart idp

- name: Generate OpenLDAP admin password
  copy:
    content: "admin\n"
    dest: /etc/secos/openldap/admin_password
    owner: root
    group: root
    mode: "0400"
  no_log: true

# ── Keycloak container config ──
- name: Deploy Keycloak realm import
  template:
    src: bastion-realm.json.j2
    dest: /etc/secos/keycloak/import/bastion-realm.json
    mode: "0644"
  notify: restart idp

- name: Generate Keycloak admin password
  copy:
    content: "{{ lookup('password', '/tmp/secos-keycloak-admin-password length=24 chars=ascii_letters,digits') }}"
    dest: /etc/secos/keycloak/admin_password
    owner: root
    group: root
    mode: "0400"
  no_log: true

# ── Compose + systemd ──
- name: Deploy IdP compose file
  copy:
    src: "{{ playbook_dir }}/../containers/idp/compose.yml"
    dest: /opt/secos/idp/compose.yml
    mode: "0644"
  notify: restart idp

- name: Install IdP systemd unit
  copy:
    src: secos-idp.service
    dest: /etc/systemd/system/secos-idp.service
    mode: "0644"
  notify:
    - daemon reload
    - restart idp

- name: Enable and start IdP stack
  systemd:
    name: secos-idp
    enabled: true
    state: started
    daemon_reload: true

# Drain any pending handler restarts (file copies above notify `restart idp`)
# before LDIF import starts, so the first container boot finishes uninterrupted.
# Bitnami openldap skips LDIF loading on subsequent boots once the data volume
# is non-empty, so a mid-init restart permanently loses the seed users.
- name: Flush handlers before LDIF import
  meta: flush_handlers

- name: Wait for OpenLDAP to accept connections
  wait_for:
    host: 127.0.0.1
    port: 389
    timeout: 120

- name: Wait for LDAP base DN (first-boot LDIF import)
  command: ldapsearch -x -H ldap://127.0.0.1:389 -b "dc=bastion,dc=local" -s base
  register: ldap_base_check
  until: ldap_base_check.rc == 0
  retries: 30
  delay: 4
  changed_when: false

# ── Firewall ──
- name: Install firewalld
  dnf:
    name: firewalld
    state: present

- name: Deploy firewalld internal zone
  template:
    src: firewalld-internal-bastion.xml.j2
    dest: /etc/firewalld/zones/internal-bastion.xml
  notify: reload firewalld

- name: Deploy firewalld public zone
  template:
    src: firewalld-public.xml.j2
    dest: /etc/firewalld/zones/public.xml
  notify: reload firewalld

- name: Enable and start firewalld
  systemd:
    name: firewalld
    enabled: true
    state: started

# ── Backups ──
- name: Install NFS utils and cronie
  dnf:
    name:
      - nfs-utils
      - cronie
      - openldap-clients
    state: present

- name: Mount NFS backup share
  mount:
    path: /mnt/backups
    src: "192.168.56.50:/export/backups"
    fstype: nfs
    opts: _netdev,defaults
    state: mounted

- name: Deploy LDAP backup script
  copy:
    dest: /opt/secos/bin/secos-backup-ldap
    mode: "0755"
    content: |
      #!/bin/bash
      set -e
      mkdir -p /mnt/backups/ldap
      ldapsearch -x -H ldap://127.0.0.1:389 -D "cn=admin,dc=bastion,dc=local" -w admin -b "dc=bastion,dc=local" \
        | gzip > /mnt/backups/ldap/ldap-$(date +%F).ldif.gz
      find /mnt/backups/ldap/ -name "*.ldif.gz" -mtime +7 -delete

- name: Deploy Keycloak backup script
  copy:
    dest: /opt/secos/bin/secos-backup-keycloak
    mode: "0755"
    content: |
      #!/bin/bash
      set -e
      mkdir -p /mnt/backups/keycloak
      /usr/bin/podman exec keycloak /opt/keycloak/bin/kc.sh export --dir /tmp/kc-export --realm bastion
      /usr/bin/podman cp keycloak:/tmp/kc-export /mnt/backups/keycloak/$(date +%F)
      /usr/bin/podman exec keycloak rm -rf /tmp/kc-export
      find /mnt/backups/keycloak/ -maxdepth 1 -mindepth 1 -type d -mtime +7 -exec rm -rf {} +

- name: Deploy config backup script
  copy:
    dest: /opt/secos/bin/secos-backup-configs
    mode: "0755"
    content: |
      #!/bin/bash
      set -e
      mkdir -p /mnt/backups/configs/idp-node
      rsync -a /etc/ /mnt/backups/configs/idp-node/

- name: Daily LDAP backup cron
  cron:
    name: backup-ldap
    minute: "0"
    hour: "2"
    user: root
    job: /opt/secos/bin/secos-backup-ldap

- name: Daily Keycloak realm export cron
  cron:
    name: backup-keycloak
    minute: "30"
    hour: "2"
    user: root
    job: /opt/secos/bin/secos-backup-keycloak

- name: Daily config backup cron
  cron:
    name: backup-configs
    minute: "0"
    hour: "3"
    user: root
    job: /opt/secos/bin/secos-backup-configs

- name: Enable crond
  systemd:
    name: crond
    enabled: true
    state: started
