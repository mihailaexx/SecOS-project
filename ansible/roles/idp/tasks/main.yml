---
# ── Remove legacy native install (if upgrading from pre-containerized deployment) ──
- name: Stop + disable legacy slapd
  ansible.builtin.systemd:
    name: slapd
    state: stopped
    enabled: false
  failed_when: false

- name: Stop + disable legacy keycloak
  ansible.builtin.systemd:
    name: keycloak
    state: stopped
    enabled: false
  failed_when: false

- name: Remove legacy openldap-servers package
  ansible.builtin.dnf:
    name:
      - openldap-servers
    state: absent
  failed_when: false

- name: Remove legacy keycloak install dir + unit file
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /opt/keycloak
    - /etc/systemd/system/keycloak.service

# ── Remove legacy rootful IdP install ──
- name: Stop + disable legacy rootful secos-idp unit
  ansible.builtin.systemd:
    name: secos-idp
    state: stopped
    enabled: false
  failed_when: false

- name: Remove legacy rootful unit file
  ansible.builtin.file:
    path: /etc/systemd/system/secos-idp.service
    state: absent

- name: Remove legacy /etc/secos IdP config tree
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/secos/openldap
    - /etc/secos/keycloak
    - /opt/secos/idp

# ── Rootless config tree under secos $HOME ──
- name: Create secos IdP config tree
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: secos
    group: secos
    mode: "0755"
  loop:
    - /var/lib/secos/secos/idp
    - /var/lib/secos/secos/idp/openldap
    - /var/lib/secos/secos/idp/openldap/ldifs
    - /var/lib/secos/secos/idp/keycloak
    - /var/lib/secos/secos/idp/keycloak/import

- name: Create root-owned operator paths
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /opt/secos/bin
    - /mnt/backups

# ── OpenLDAP container config ──
- name: Deploy OpenLDAP LDIF (container-compatible)
  ansible.builtin.copy:
    src: ldap-container.ldif
    dest: /var/lib/secos/secos/idp/openldap/ldifs/01-users.ldif
    owner: secos
    group: secos
    mode: "0644"
  notify: restart idp

- name: Ensure controller-side password cache dir exists
  ansible.builtin.file:
    path: "{{ secos_password_cache_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false
  run_once: true

# Resolve both admin passwords ONCE into facts so the on-disk admin_password
# files (consumed by backup scripts) and the compose `.env` (consumed by the
# containers themselves) hold byte-identical values. Vault wins; lookup
# generates a stable random fallback per-controller.
- name: Resolve OpenLDAP admin password
  ansible.builtin.set_fact:
    secos_openldap_admin_password: "{{ vault_openldap_admin_password | default(lookup('password', secos_password_cache_dir ~ '/openldap-admin-password length=24 chars=ascii_letters,digits')) }}"
  no_log: true

- name: Resolve Keycloak admin password
  ansible.builtin.set_fact:
    secos_keycloak_admin_password: "{{ lookup('password', secos_password_cache_dir ~ '/keycloak-admin-password length=24 chars=ascii_letters,digits') }}"
  no_log: true

- name: Write OpenLDAP admin password file (for backup scripts)
  ansible.builtin.copy:
    # NO trailing newline. ldapsearch -y reads the entire file as the password
    # and OpenLDAP rejects "<pw>\n" with rc=49. Backup scripts also read this
    # via `tr -d '\n'` for defense in depth.
    content: "{{ secos_openldap_admin_password }}"
    dest: /var/lib/secos/secos/idp/openldap/admin_password
    owner: secos
    group: secos
    mode: "0400"
  no_log: true
  register: ldap_pw_file

# ── Keycloak container config ──
- name: Deploy Keycloak realm import
  ansible.builtin.template:
    src: bastion-realm.json.j2
    dest: /var/lib/secos/secos/idp/keycloak/import/bastion-realm.json
    owner: secos
    group: secos
    mode: "0640"
  notify: restart idp
  no_log: true

- name: Write Keycloak admin password file
  ansible.builtin.copy:
    content: "{{ secos_keycloak_admin_password }}"
    dest: /var/lib/secos/secos/idp/keycloak/admin_password
    owner: secos
    group: secos
    mode: "0400"
  no_log: true
  register: kc_pw_file

# ── Compose + systemd user unit ──
# Render the compose with passwords substituted at deploy time. podman-compose
# never has to do `${VAR}` env substitution (which has been inconsistent
# across versions and was the root cause of an "Invalid credentials" loop
# during initial migration from the old hardcoded `admin` literal).
# 0640 secos-only: contains the live admin passwords.
- name: Deploy IdP compose file (with rendered passwords)
  ansible.builtin.template:
    src: compose.yml.j2
    dest: /var/lib/secos/secos/idp/compose.yml
    owner: secos
    group: secos
    mode: "0640"
  notify: restart idp
  no_log: true
  register: idp_compose_file

# Earlier iterations of this role wrote a `.env` to be loaded via systemd
# EnvironmentFile=; we now render the compose with values inline. Remove
# the stale file so the rootless host doesn't keep a redundant secret on disk.
- name: Remove legacy IdP .env file
  ansible.builtin.file:
    path: /var/lib/secos/secos/idp/.env
    state: absent

# Install/refresh the systemd unit BEFORE the volume-reset block so the
# stop uses the current unit definition (and `daemon-reload` happens
# before any restart).
- name: Install IdP systemd user unit
  ansible.builtin.copy:
    src: secos-idp.service
    dest: /var/lib/secos/.config/systemd/user/secos-idp.service
    owner: secos
    group: secos
    mode: "0644"
  register: idp_unit_file
  notify:
    - daemon reload idp
    - restart idp

# Pick up new unit content before stopping the stack — otherwise
# systemd's `stop` runs with the old unit definition.
- name: Reload secos user systemd before volume reset
  when: idp_unit_file.changed or idp_compose_file.changed
  become: true
  become_user: secos
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ secos_uid }}"
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user

# Bitnami OpenLDAP and Keycloak's dev-file backend ONLY honor
# LDAP_ADMIN_PASSWORD / KC_BOOTSTRAP_ADMIN_PASSWORD on first init of an
# empty volume. If we ever rotate the password OR migrate from the legacy
# hardcoded `admin` literal, the container keeps the old credential in
# its persistent volume and bind fails. Reset the volumes whenever the
# admin password file or the .env changes — LDIF data is bootstrapped
# from /ldifs and the Keycloak realm is reimported from /import, so no
# meaningful state is lost.
#
# Override with `-e secos_idp_force_recreate=true` to force a wipe
# (useful when migrating from the legacy compose with literal passwords).
- name: Reset IdP container volumes when admin password changes
  when: >-
    secos_idp_force_recreate | default(false) | bool
    or ldap_pw_file.changed
    or kc_pw_file.changed
    or idp_compose_file.changed
  become: true
  become_user: secos
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ secos_uid }}"
  block:
    - name: Stop IdP stack so volumes can be wiped
      ansible.builtin.systemd:
        name: secos-idp
        state: stopped
        scope: user
      register: idp_stop
      failed_when:
        - idp_stop.failed | default(false)
        - "'not loaded' not in (idp_stop.msg | default(''))"

    # `podman volume rm -f` returns rc 0 when the volume is gone OR was
    # missing. Surface anything else (e.g. "in use" if the unit somehow
    # didn't stop) instead of silently swallowing it.
    - name: Remove openldap-data volume
      ansible.builtin.command: podman volume rm -f openldap-data
      register: rm_ldap_vol
      changed_when: rm_ldap_vol.rc == 0 and rm_ldap_vol.stdout != ''
      failed_when:
        - rm_ldap_vol.rc != 0
        - "'no such volume' not in (rm_ldap_vol.stderr | lower)"

    - name: Remove keycloak-data volume
      ansible.builtin.command: podman volume rm -f keycloak-data
      register: rm_kc_vol
      changed_when: rm_kc_vol.rc == 0 and rm_kc_vol.stdout != ''
      failed_when:
        - rm_kc_vol.rc != 0
        - "'no such volume' not in (rm_kc_vol.stderr | lower)"

- name: Enable and start IdP stack (rootless)
  become: true
  become_user: secos
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ secos_uid }}"
  ansible.builtin.systemd:
    name: secos-idp
    enabled: true
    state: started
    scope: user
    daemon_reload: true

# Drain any pending handler restarts (file copies above notify `restart idp`)
# before LDIF import starts, so the first container boot finishes uninterrupted.
# Bitnami openldap skips LDIF loading on subsequent boots once the data volume
# is non-empty, so a mid-init restart permanently loses the seed users.
- name: Flush handlers before LDIF import
  meta: flush_handlers

- name: Wait for OpenLDAP to accept connections
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 389
    timeout: 120

- name: Install openldap-clients (needed for readiness check + backup script)
  ansible.builtin.dnf:
    name: openldap-clients
    state: present

- name: Wait for LDAP base DN (first-boot LDIF import)
  ansible.builtin.command: ldapsearch -x -H ldap://127.0.0.1:389 -b "dc=bastion,dc=local" -s base
  register: ldap_base_check
  until: ldap_base_check.rc == 0
  retries: 30
  delay: 4
  changed_when: false

# ── Firewall ──
- name: Install firewalld
  ansible.builtin.dnf:
    name: firewalld
    state: present

- name: Deploy firewalld internal zone
  ansible.builtin.template:
    src: firewalld-internal-bastion.xml.j2
    dest: /etc/firewalld/zones/internal-bastion.xml
  notify: reload firewalld

- name: Deploy firewalld public zone
  ansible.builtin.template:
    src: firewalld-public.xml.j2
    dest: /etc/firewalld/zones/public.xml
  notify: reload firewalld

- name: Enable and start firewalld
  ansible.builtin.systemd:
    name: firewalld
    enabled: true
    state: started

# ── Backups ──
# Backup scripts run as root from cron. The Keycloak container is owned by the
# secos rootless runtime, so any `podman exec` must hop into secos's user
# namespace via `sudo -iu secos` (which inherits XDG_RUNTIME_DIR via linger).
- name: Install NFS utils and cronie
  ansible.builtin.dnf:
    name:
      - nfs-utils
      - cronie
    state: present

- name: Mount NFS backup share
  ansible.posix.mount:
    path: /mnt/backups
    src: "{{ secos_storage_ip }}:/export/backups"
    fstype: nfs
    opts: "{{ secos_nfs_mount_opts }}"
    state: mounted

- name: Deploy LDAP backup script
  ansible.builtin.copy:
    dest: /opt/secos/bin/secos-backup-ldap
    owner: root
    group: root
    mode: "0750"
    content: |
      #!/bin/bash
      # Stages to .tmp and atomically renames on success — `set -o pipefail`
      # alone leaves an empty 20-byte gz on disk when ldapsearch rejects the
      # bind, silently overwriting the previous good backup.
      set -euo pipefail
      umask 077
      mkdir -p /mnt/backups/ldap
      OUT=/mnt/backups/ldap/ldap-$(date +%F).ldif.gz
      TMP=$OUT.tmp
      # `-y file` would include the trailing newline as part of the password
      # and OpenLDAP returns rc=49. Read explicitly and pass via -w.
      PW=$(tr -d '\n' < /var/lib/secos/secos/idp/openldap/admin_password)
      ldapsearch -x -H ldap://127.0.0.1:389 -D "cn=admin,dc=bastion,dc=local" \
        -w "$PW" -b "dc=bastion,dc=local" \
        | gzip > "$TMP"
      # Sanity-check: gunzip must contain at least one DN entry, otherwise
      # we just wrote an empty gz from a partially failed pipe.
      gunzip -c "$TMP" | grep -q '^dn:' || { rm -f "$TMP"; echo "ldap backup empty — refusing to publish" >&2; exit 1; }
      mv "$TMP" "$OUT"
      find /mnt/backups/ldap/ -name "*.ldif.gz" -mtime +7 -delete

- name: Deploy Keycloak backup script
  ansible.builtin.copy:
    dest: /opt/secos/bin/secos-backup-keycloak
    owner: root
    group: root
    mode: "0750"
    content: |
      #!/bin/bash
      # Live realm export via the admin REST API. `kc.sh export` cannot run
      # while the server holds the H2 file lock; partial-export works against
      # the running Keycloak. User entries are intentionally excluded — they
      # are federated from LDAP and covered by secos-backup-ldap.
      set -euo pipefail
      umask 077
      mkdir -p /mnt/backups/keycloak
      OUT=/mnt/backups/keycloak/keycloak-realm-bastion-$(date +%F).json.gz
      TMP=$OUT.tmp
      KC_URL=http://127.0.0.1:8080
      ADMIN_PW=$(tr -d '\n' < /var/lib/secos/secos/idp/keycloak/admin_password)
      TOKEN=$(curl -fsS -X POST "$KC_URL/realms/master/protocol/openid-connect/token" \
        -d grant_type=password -d client_id=admin-cli \
        -d username=admin --data-urlencode "password=$ADMIN_PW" \
        | python3 -c 'import json,sys; print(json.load(sys.stdin)["access_token"])')
      # partial-export is POST, not GET — `curl -fsS` defaults to GET and
      # returns 404 on this endpoint.
      curl -fsS -X POST -H "Authorization: Bearer $TOKEN" \
        "$KC_URL/admin/realms/bastion/partial-export?exportClients=true&exportGroupsAndRoles=true" \
        | gzip > "$TMP"
      # Sanity-check: must contain the realm key, otherwise we just gzipped
      # an empty body from a failed call.
      gunzip -c "$TMP" | grep -q '"realm"[[:space:]]*:[[:space:]]*"bastion"' \
        || { rm -f "$TMP"; echo "keycloak backup did not contain realm — refusing to publish" >&2; exit 1; }
      mv "$TMP" "$OUT"
      find /mnt/backups/keycloak/ -maxdepth 1 -name 'keycloak-realm-bastion-*.json.gz' -mtime +7 -delete

- name: Deploy config backup script
  ansible.builtin.copy:
    dest: /opt/secos/bin/secos-backup-configs
    mode: "0755"
    content: |
      #!/bin/bash
      set -e
      mkdir -p /mnt/backups/configs/idp-node
      rsync -a /etc/ /mnt/backups/configs/idp-node/

- name: Daily LDAP backup cron
  ansible.builtin.cron:
    name: backup-ldap
    minute: "0"
    hour: "2"
    user: root
    job: /opt/secos/bin/secos-backup-ldap

- name: Daily Keycloak realm export cron
  ansible.builtin.cron:
    name: backup-keycloak
    minute: "30"
    hour: "2"
    user: root
    job: /opt/secos/bin/secos-backup-keycloak

- name: Daily config backup cron
  ansible.builtin.cron:
    name: backup-configs
    minute: "0"
    hour: "3"
    user: root
    job: /opt/secos/bin/secos-backup-configs

- name: Enable crond
  ansible.builtin.systemd:
    name: crond
    enabled: true
    state: started
