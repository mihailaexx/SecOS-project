---
# Journal shipper: systemd-journal-upload → storage-node:19532.
# Persistent journald ensures logs survive a reboot and backlog
# while the collector is unreachable.

- name: Install systemd-journal-remote package (provides journal-upload)
  dnf:
    name: systemd-journal-remote
    state: present

- name: Ensure journald drop-in directory
  file:
    path: /etc/systemd/journald.conf.d
    state: directory

- name: Enable persistent journald storage
  copy:
    dest: /etc/systemd/journald.conf.d/00-persistent.conf
    content: |
      [Journal]
      Storage=persistent
      ForwardToSyslog=no
  notify: restart journald

- name: Deploy journal-upload config
  template:
    src: journal-upload.conf.j2
    dest: /etc/systemd/journal-upload.conf
    mode: "0644"
  notify: restart journal-upload

# State dir is provisioned by the unit's StateDirectory= under DynamicUser,
# so do not pre-create /var/lib/systemd/journal-upload here.

- name: Enable and start journal-upload
  systemd:
    name: systemd-journal-upload.service
    enabled: true
    state: started
