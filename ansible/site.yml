---
# Provisioning order:
#   lb bootstrap (sshd management port) → container_runtime all → storage → idp → lb role → bastions → target

# lb-node bootstrap: port 22 → sshd on 2222 → HAProxy takes 22
# On fresh VM: connects on 22, reconfigures sshd, switches to 2222
# On re-run: port 2222 already open, bootstrap is skipped
# Runs FIRST so later `hosts: all` plays can SSH to lb on the inventory-declared port 2222.
- name: Bootstrap lb-node SSH management port
  hosts: lb
  gather_facts: false
  tasks:
    - name: Check if management port 2222 is already open
      wait_for:
        host: "{{ ansible_host }}"
        port: 2222
        timeout: 3
      delegate_to: localhost
      become: false
      register: mgmt_port_check
      ignore_errors: true

    - name: Configure sshd management port (first run only)
      when: mgmt_port_check is failed
      vars:
        ansible_port: 22
      block:
        - name: Gather facts
          setup:

        - name: Get NAT interface IP (default-route interface)
          shell: |
            set -o pipefail
            iface=$(ip -4 route show default | awk '{print $5; exit}')
            ip -4 -o addr show "$iface" | awk '{print $4}' | cut -d/ -f1
          register: eth0_ip
          changed_when: false

        - name: Remove existing ListenAddress lines
          lineinfile:
            path: /etc/ssh/sshd_config
            regexp: '^#?ListenAddress'
            state: absent

        - name: Bind sshd to NAT:22 + management:2222
          blockinfile:
            path: /etc/ssh/sshd_config
            marker: "# {mark} MANAGED BY ANSIBLE - SSHD LISTEN"
            block: |
              ListenAddress {{ eth0_ip.stdout }}:22
              ListenAddress 127.0.0.1:22
              ListenAddress 0.0.0.0:2222

        - name: Install SELinux management tools
          dnf:
            name:
              - python3-libselinux
              - python3-libsemanage
              - policycoreutils-python-utils
            state: present

        - name: Allow sshd to bind to port 2222 (SELinux)
          command: semanage port -a -t ssh_port_t -p tcp 2222
          register: semanage_result
          failed_when: semanage_result.rc != 0 and 'already defined' not in semanage_result.stderr
          changed_when: semanage_result.rc == 0

        - name: Validate sshd config before restart
          command: sshd -t
          changed_when: false

        - name: Restart sshd to activate management port (async — port 22 will drop)
          shell: sleep 2 && systemctl restart sshd
          async: 10
          poll: 0

    - name: Wait for management port 2222
      wait_for:
        host: "{{ ansible_host }}"
        port: 2222
        timeout: 30
      delegate_to: localhost
      become: false

- name: Install container runtime on all hosts
  hosts: all:!hypervisor
  roles:
    - container_runtime

- name: Configure storage-node (NFS + RAID1)
  hosts: storage
  roles:
    - storage

- name: Configure idp-node (Keycloak + OpenLDAP containers)
  hosts: idp
  roles:
    - idp

- name: Configure lb-node (HAProxy)
  hosts: lb
  roles:
    - lb

- name: Configure bastion nodes (SSH + OIDC)
  hosts: bastions
  roles:
    - bastion

- name: Configure test-server (PostgreSQL)
  hosts: target
  roles:
    - target

# ── Observability layer ──
# Deploy auditd first so later changes are captured, then bring up
# the central log sink, then enable shippers on the rest of the fleet.

- name: Configure auditd on all hosts
  hosts: all:!hypervisor
  roles:
    - audit

- name: Configure central log sink (storage-node)
  hosts: storage
  roles:
    - logging_server

- name: Configure journal shippers on all non-storage hosts
  hosts: idp:lb:bastions:target
  roles:
    - logging_client

# ── Monitoring stack (containerized) ──
# monitoring_stack  (storage-node): Prometheus + Loki + Grafana via podman-compose.
# monitoring_agents (all hosts):    Promtail + Node Exporter via podman-compose.

- name: Deploy central monitoring stack on storage-node
  hosts: storage
  roles:
    - monitoring_stack

- name: Deploy monitoring agents on all hosts
  hosts: all:!hypervisor
  roles:
    - monitoring_agents

# ── Hypervisor-side access ──
# Forward host LAN :3000 -> storage-node Grafana so a laptop on the workstation's
# LAN can reach Grafana without joining 192.168.56.0/24.
# Runs against the local workstation (group [hypervisor] in inventory). Because
# this play uses local sudo, invoke with `--ask-become-pass` (-K), or limit to
# the lab with `--limit '!hypervisor'` to skip it.

- name: Configure hypervisor-side TCP forwarders
  hosts: hypervisor
  become: true
  roles:
    - grafana_forward
