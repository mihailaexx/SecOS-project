[defaults]
inventory = inventory/hosts.ini
# Lab-only: VMs are ephemeral and host keys regenerate on each rebuild.
# DO NOT carry this setting into production.
host_key_checking = False
timeout = 30
forks = 10
# Default ~/.ansible/tmp avoids /tmp's tmp_t SELinux transitions and
# multi-user collisions on shared controllers.
remote_tmp = ~/.ansible/tmp
# Cache facts across plays so the three `all:!hypervisor` plays in
# site.yml don't each re-run gather_facts on every host.
fact_caching = jsonfile
fact_caching_connection = ~/.ansible/factcache
fact_caching_timeout = 7200

[ssh_connection]
ssh_args = -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no
pipelining = True

[privilege_escalation]
become = True
become_method = sudo
