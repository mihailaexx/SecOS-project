---
# ── SIS#6 fleet-wide SELinux assertions ──
# Cheap to run, fail fast if any node has slipped to permissive or if the
# storage labels haven't been pinned. Targets every guest before per-host
# tests so a misconfigured node surfaces here, not 1k lines later.
- name: SELinux fleet baseline
  hosts: all:!hypervisor
  tasks:
    - name: getenforce reports Enforcing
      command: getenforce
      register: ge
      changed_when: false
      failed_when: ge.stdout.strip() != 'Enforcing'

    # Provisioning-time control: the `ansible` SSH user must resolve to
    # unconfined_u so roles can `semanage`, restorecon, install packages.
    # Read /etc/selinux/targeted/seusers directly — no tooling required.
    # Require an EXPLICIT row, not __default__: site.yml pins it via
    # community.general.selogin, and an explicit row guards against an
    # upstream Fedora change to __default__'s mapping.
    - name: Read seusers map
      slurp:
        src: /etc/selinux/targeted/seusers
      register: seusers_file

    - name: Assert ansible → unconfined_u (explicit selogin row)
      vars:
        seusers: "{{ seusers_file.content | b64decode }}"
      assert:
        that: "seusers is search('(?m)^ansible:unconfined_u:')"
        fail_msg: "ansible login is not pinned to unconfined_u in seusers:\n{{ seusers }}"

    - name: Assert legacy vagrant account is gone
      command: getent passwd vagrant
      register: vagrant_passwd
      changed_when: false
      failed_when: vagrant_passwd.rc == 0

    # Test window is intentionally short (last 2 minutes). The point is to
    # catch *fresh* AVCs introduced by recent role changes, not historical
    # ones that have already been remediated. `ausearch -ts recent` defaults
    # to 10min, which surfaces stale denials from before a fix was applied.
    - name: No new AVC denials in the last 2 minutes (excluding pam_keycloak_oidc)
      shell: |
        set -o pipefail
        ausearch -m AVC -ts "$(date -d '2 minutes ago' '+%H:%M:%S')" 2>/dev/null \
          | grep -v pam_keycloak_oidc \
          | grep -E '^type=AVC' || true
      register: avc_recent
      changed_when: false

    - name: Assert AVC log clean
      assert:
        that: "avc_recent.stdout == ''"
        fail_msg: "Recent AVC denials present:\n{{ avc_recent.stdout }}"

# ── SIS#6 storage-side label assertions ──
- name: SELinux storage labels
  hosts: storage
  tasks:
    - name: ls -Zd on exported trees
      command: ls -Zd /export/home /export/backups
      register: ls_export
      changed_when: false

    # Fedora policy types per matchpathcon:
    #   /export/home              → home_root_t       (root of home dirs)
    #   /export/home/<user>       → user_home_dir_t   (per-user home entry)
    #   /export/home/<user>/<f>   → user_home_t       (files inside)
    # libsemanage rewrites the parent to home_root_t even with our explicit
    # user_home_dir_t rule, so test for the actual resolved labels.
    - name: Assert /export/home → home_root_t and /export/backups → public_content_t
      assert:
        that:
          - "'home_root_t' in ls_export.stdout"
          - "'public_content_t' in ls_export.stdout"
        fail_msg: "Storage export labels missing — see ls -Zd output:\n{{ ls_export.stdout }}"

    - name: Per-user home dir labeled user_home_dir_t
      command: ls -Zd /export/home/m.bulushev
      register: ls_userhome
      changed_when: false

    - name: Assert per-user home → user_home_dir_t
      assert:
        that: "'user_home_dir_t' in ls_userhome.stdout"
        fail_msg: "/export/home/m.bulushev not labeled user_home_dir_t: {{ ls_userhome.stdout }}"

    - name: NFS exports advertise security_label
      command: exportfs -v
      register: exportfs_v
      changed_when: false

    # exportfs -v line-wraps long path/options pairs onto separate lines,
    # so the regex needs DOTALL ((?s)) to span newlines between path and options.
    - name: Assert security_label on both exports
      assert:
        that:
          - "exportfs_v.stdout is search('(?s)/export/home.*?security_label')"
          - "exportfs_v.stdout is search('(?s)/export/backups.*?security_label')"
        fail_msg: "NFS exports missing security_label option:\n{{ exportfs_v.stdout }}"

# ── SIS#6 bastion-side login confinement assertions ──
- name: SELinux login confinement on bastions
  hosts: bastions
  tasks:
    # selinuxdefcon <user> <from-context> resolves the login context the
    # user would transition into. `runuser` / `su -l` don't work here —
    # neither invokes pam_selinux, so they preserve the parent's context
    # and we'd be asserting on the test runner's identity instead of the
    # user's. sshd's pam_selinux is the real gate, so use sshd_t as `from`.
    # selinuxdefcon exits with rc=1 even on successful resolution (the answer
    # arrives via stdout). Gate on stdout content, not the exit code.
    - name: Resolve m.bulushev login context (from sshd)
      command: selinuxdefcon m.bulushev system_u:system_r:sshd_t:s0
      register: id_user
      changed_when: false
      failed_when: id_user.stdout == '' or id_user.stderr != ''

    - name: Assert m.bulushev runs as user_u:user_r:user_t
      assert:
        that: "'user_u:user_r:user_t' in id_user.stdout"
        fail_msg: "m.bulushev not confined to user_t: {{ id_user.stdout }}"

    - name: Resolve admin1 login context (from sshd)
      command: selinuxdefcon admin1 system_u:system_r:sshd_t:s0
      register: id_admin
      changed_when: false
      failed_when: id_admin.stdout == '' or id_admin.stderr != ''

    - name: Assert admin1 runs as staff_u:staff_r:staff_t
      assert:
        that: "'staff_u:staff_r:staff_t' in id_admin.stdout"
        fail_msg: "admin1 not in staff_t shell: {{ id_admin.stdout }}"

    - name: staff_u extended with sysadm_r
      command: semanage user -l
      register: seuser_list
      changed_when: false

    - name: Assert staff_u has both staff_r and sysadm_r
      assert:
        that:
          - "seuser_list.stdout is search('staff_u.*staff_r')"
          - "seuser_list.stdout is search('staff_u.*sysadm_r')"
        fail_msg: "staff_u missing sysadm_r — admins cannot sudo into sysadm_t"

    # NFSv4.2 + the server's `security_label` export option propagates real
    # SELinux labels to clients. The kernel exposes this automatically — no
    # explicit mount option required — and reports `seclabel` in the active
    # options once labels are flowing.
    - name: backup mount carries seclabel
      command: findmnt -n -o OPTIONS /mnt/backups
      register: mnt_opts
      changed_when: false

    - name: Assert seclabel on /mnt/backups
      assert:
        that: "'seclabel' in mnt_opts.stdout"
        fail_msg: "/mnt/backups missing seclabel — NFSv4 SELinux labels not active: {{ mnt_opts.stdout }}"

# ── SIS#6 test-server DBA confinement ──
- name: SELinux DBA confinement on test-server
  hosts: target
  tasks:
    # See note in the bastion play above: use selinuxdefcon, not runuser.
    - name: Resolve dba1 login context (from sshd)
      command: selinuxdefcon dba1 system_u:system_r:sshd_t:s0
      register: id_dba
      changed_when: false
      failed_when: id_dba.stdout == '' or id_dba.stderr != ''

    - name: Assert dba1 runs as staff_u:staff_r:staff_t
      assert:
        that: "'staff_u:staff_r:staff_t' in id_dba.stdout"
        fail_msg: "dba1 not in staff_t shell: {{ id_dba.stdout }}"

# ── Storage node tests ──
- name: Test storage-node
  hosts: storage
  tasks:
    - name: Check RAID1 array
      command: cat /proc/mdstat
      register: mdstat
      changed_when: false

    - name: Verify RAID1 is active
      assert:
        that: "'md0 : active raid1' in mdstat.stdout"
        fail_msg: "RAID1 array md0 not active"

    - name: Check /export/home mount
      command: findmnt -n -o FSTYPE /export/home
      register: home_mount
      changed_when: false

    - name: Verify /export/home is XFS
      assert:
        that: "home_mount.stdout | trim == 'xfs'"
        fail_msg: "/export/home is not XFS"

    - name: Check NFS exports
      command: exportfs -v
      register: exports
      changed_when: false

    - name: Verify NFS exports configured
      assert:
        that: "'/export/home' in exports.stdout"
        fail_msg: "NFS /export/home not exported"

    - name: Check NFS service running
      systemd:
        name: nfs-server
        state: started
      check_mode: true
      register: nfs_svc

    - name: Verify NFS service
      assert:
        that: "nfs_svc.status.ActiveState == 'active'"
        fail_msg: "NFS server not running"

    - name: Check crond running
      systemd:
        name: crond
        state: started
      check_mode: true
      register: crond_svc

    - name: Verify crond
      assert:
        that: "crond_svc.status.ActiveState == 'active'"
        fail_msg: "crond not running"

    - name: Check backup directories exist
      stat:
        path: "{{ item }}"
      loop:
        - /export/backups/postgres
        - /export/backups/ldap
        - /export/backups/keycloak
        - /export/backups/configs
      register: backup_dirs

    - name: Verify backup directories
      assert:
        that: "item.stat.exists"
        fail_msg: "{{ item.item }} missing"
      loop: "{{ backup_dirs.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Check auditd running
      systemd:
        name: auditd
        state: started
      check_mode: true
      register: auditd_svc

    - name: Verify auditd
      assert:
        that: "auditd_svc.status.ActiveState == 'active'"
        fail_msg: "auditd not running"

    - name: Check kernel audit=1 parameter
      command: grep -o audit=1 /proc/cmdline
      register: audit_cmdline
      changed_when: false
      failed_when: false

    - name: Verify audit=1 in /proc/cmdline
      assert:
        that: "audit_cmdline.stdout == 'audit=1'"
        fail_msg: "kernel boot arg audit=1 missing — file watches inert until reboot"

    - name: Check journald audit socket masked
      command: systemctl is-enabled systemd-journald-audit.socket
      register: jas_state
      changed_when: false
      failed_when: false

    - name: Verify journald audit socket masked
      assert:
        that: "jas_state.stdout | trim == 'masked'"
        fail_msg: "systemd-journald-audit.socket not masked — journald may steal kernel audit_pid"

    - name: Check journal-remote socket
      systemd:
        name: systemd-journal-remote.socket
        state: started
      check_mode: true
      register: jrs_socket

    - name: Verify journal-remote socket
      assert:
        that: "jrs_socket.status.ActiveState == 'active'"
        fail_msg: "systemd-journal-remote.socket not active"

    - name: Check journal-remote service
      systemd:
        name: systemd-journal-remote.service
        state: started
      check_mode: true
      register: jrs_service

    - name: Verify journal-remote service
      assert:
        that: "jrs_service.status.ActiveState in ['active', 'activating']"
        fail_msg: "systemd-journal-remote.service not active"

    - name: Check mdadm detail
      command: mdadm --detail /dev/md0
      register: mdadm_detail
      changed_when: false

    - name: Verify mdadm clean state (2 active, 0 failed)
      assert:
        that:
          - "'State : clean' in mdadm_detail.stdout"
          - "'Active Devices : 2' in mdadm_detail.stdout"
          - "'Failed Devices : 0' in mdadm_detail.stdout"
        fail_msg: "RAID1 not clean"

    - name: Check showmount lists exports
      command: showmount -e localhost
      register: showmount_out
      changed_when: false

    - name: Verify both NFS exports listed
      assert:
        that:
          - "'/export/home' in showmount_out.stdout"
          - "'/export/backups' in showmount_out.stdout"
        fail_msg: "NFS exports incomplete"

    - name: Check storage firewall internal-bastion zone
      command: firewall-cmd --zone=internal-bastion --list-all
      register: fw_storage
      changed_when: false

    - name: Verify storage firewall ports (NFS + journal-remote)
      assert:
        that:
          - "'nfs' in fw_storage.stdout"
          - "'19532/tcp' in fw_storage.stdout"
        fail_msg: "internal-bastion zone missing nfs service or 19532"

    - name: Check storage root crontab
      command: crontab -l
      register: storage_crontab
      changed_when: false
      failed_when: false

    - name: Verify storage cron entries (backup-homes + prune-remote-journals)
      assert:
        that:
          - "'backup-homes' in storage_crontab.stdout"
          - "'prune-remote-journals' in storage_crontab.stdout"
        fail_msg: "Storage cron entries missing"

# ── IDP node tests ──
- name: Test idp-node
  hosts: idp
  tasks:
    # secos-idp is a rootless user-scope unit owned by the `secos` system
    # user (post-58fdb9f). The host's PID 1 doesn't see it, so query it
    # against the user's session bus via systemctl --user --machine=secos@.
    - name: Check secos-idp rootless user unit running
      command: systemctl --user --machine=secos@.host is-active secos-idp.service
      register: idp_svc
      changed_when: false
      failed_when: false

    - name: Verify secos-idp active
      assert:
        that: "idp_svc.stdout | trim == 'active'"
        fail_msg: "secos-idp stack (OpenLDAP + Keycloak containers) not running: {{ idp_svc.stdout }}"

    - name: Test LDAP search
      command: ldapsearch -x -H ldap://localhost -b "dc=bastion,dc=local" "(uid=m.bulushev)" uid
      register: ldap_search
      changed_when: false
      retries: 10
      delay: 6
      until: ldap_search.rc == 0

    - name: Verify LDAP user exists
      assert:
        that: "'uid: m.bulushev' in ldap_search.stdout"
        fail_msg: "LDAP user m.bulushev not found"

    - name: Test Keycloak HTTP
      uri:
        url: http://localhost:8080/realms/bastion/.well-known/openid-configuration
        return_content: false
        status_code: 200
      register: kc_http
      retries: 20
      delay: 6
      until: kc_http.status == 200

    - name: Verify Keycloak realm
      assert:
        that: "kc_http.status == 200"
        fail_msg: "Keycloak bastion realm not responding"

    - name: Check NFS backup mount
      command: findmnt -n -o FSTYPE /mnt/backups
      register: backup_mount
      changed_when: false

    - name: Verify NFS backup mount
      assert:
        that: "backup_mount.stdout | trim == 'nfs4' or backup_mount.stdout | trim == 'nfs'"
        fail_msg: "/mnt/backups not NFS-mounted"

    - name: Check IDP auditd running
      systemd:
        name: auditd
        state: started
      check_mode: true
      register: idp_auditd_svc

    - name: Verify IDP auditd
      assert:
        that: "idp_auditd_svc.status.ActiveState == 'active'"
        fail_msg: "auditd not running on idp-node"

    - name: Check IDP kernel audit=1
      command: grep -o audit=1 /proc/cmdline
      register: idp_audit_cmdline
      changed_when: false
      failed_when: false

    - name: Verify IDP audit=1
      assert:
        that: "idp_audit_cmdline.stdout == 'audit=1'"
        fail_msg: "audit=1 missing on idp-node"

    - name: Check IDP journald audit socket masked
      command: systemctl is-enabled systemd-journald-audit.socket
      register: idp_jas_state
      changed_when: false
      failed_when: false

    - name: Verify IDP journald audit socket masked
      assert:
        that: "idp_jas_state.stdout | trim == 'masked'"
        fail_msg: "journald-audit.socket not masked on idp-node"

    - name: Check IDP journal-upload running
      systemd:
        name: systemd-journal-upload.service
        state: started
      check_mode: true
      register: idp_ju_svc

    - name: Verify IDP journal-upload
      assert:
        that: "idp_ju_svc.status.ActiveState == 'active'"
        fail_msg: "journal-upload not running on idp-node"

    - name: Check IDP firewall (all zones)
      command: firewall-cmd --list-all-zones
      register: fw_idp
      changed_when: false

    - name: Verify IDP firewall (Keycloak 8080 + LDAP 389)
      assert:
        that:
          - "'8080/tcp' in fw_idp.stdout"
          - "'389/tcp' in fw_idp.stdout or 'ldap' in fw_idp.stdout"
        fail_msg: "IDP firewall missing 8080 or 389/ldap"

    - name: Check all 3 LDAP users present
      command: ldapsearch -x -H ldap://localhost -b "dc=bastion,dc=local" "(|(uid=m.bulushev)(uid=admin1)(uid=dba1))" uid
      register: ldap_users
      changed_when: false

    - name: Verify all 3 LDAP users
      assert:
        that:
          - "'uid: m.bulushev' in ldap_users.stdout"
          - "'uid: admin1' in ldap_users.stdout"
          - "'uid: dba1' in ldap_users.stdout"
        fail_msg: "Not all 3 LDAP users found"

    - name: Check IDP root crontab
      command: crontab -l
      register: idp_crontab
      changed_when: false
      failed_when: false

    - name: Verify IDP cron entries (backup-ldap + backup-keycloak + backup-configs)
      assert:
        that:
          - "'backup-ldap' in idp_crontab.stdout"
          - "'backup-keycloak' in idp_crontab.stdout"
          - "'backup-configs' in idp_crontab.stdout"
        fail_msg: "IDP cron entries missing"

    - name: LDAP backup smoke
      block:
        - name: Trigger ldapsearch-based backup (matches role's backup script)
          shell: |
            ldapsearch -x -H ldap://127.0.0.1:389 \
              -D "cn=admin,dc=bastion,dc=local" -w admin \
              -b "dc=bastion,dc=local" \
              | gzip > /mnt/backups/ldap/ldap-test-{{ lookup('pipe', 'date +%s') }}.ldif.gz
          changed_when: false

        - name: Verify LDAP backup is recoverable
          shell: |
            f=$(ls -t /mnt/backups/ldap/ldap-test-*.ldif.gz | head -1)
            test -s "$f" || exit 1
            gunzip -t "$f" || exit 1
            gunzip -c "$f" | grep -c '^dn:'
          register: ldap_dn_count
          changed_when: false

        - name: Assert LDAP backup contains entries
          assert:
            that: "ldap_dn_count.stdout | int >= 4"
            fail_msg: "LDAP backup has < 4 dn entries (expected base + 3 users)"
      always:
        - name: Cleanup LDAP backup smoke artifact
          shell: rm -f /mnt/backups/ldap/ldap-test-*.ldif.gz
          changed_when: false

# ── LB node tests ──
- name: Test lb-node
  hosts: lb
  tasks:
    - name: Check HAProxy running
      systemd:
        name: haproxy
        state: started
      check_mode: true
      register: haproxy_svc

    - name: Verify HAProxy
      assert:
        that: "haproxy_svc.status.ActiveState == 'active'"
        fail_msg: "HAProxy not running"

    - name: Check HAProxy listens on port 22
      command: ss -tlnp
      register: ss_out
      changed_when: false

    - name: Verify HAProxy on port 22
      assert:
        that: "':22 ' in ss_out.stdout"
        fail_msg: "Nothing listening on port 22"

    - name: Check sshd on port 2222
      assert:
        that: "':2222 ' in ss_out.stdout"
        fail_msg: "sshd not listening on management port 2222"

    - name: Check firewalld running
      systemd:
        name: firewalld
        state: started
      check_mode: true
      register: fw_svc

    - name: Verify firewalld
      assert:
        that: "fw_svc.status.ActiveState == 'active'"
        fail_msg: "firewalld not running"

    - name: Check NFS backup mount
      command: findmnt -n -o FSTYPE /mnt/backups
      register: backup_mount
      changed_when: false

    - name: Verify NFS backup mount
      assert:
        that: "backup_mount.stdout | trim == 'nfs4' or backup_mount.stdout | trim == 'nfs'"
        fail_msg: "/mnt/backups not NFS-mounted"

    - name: Check LB auditd running
      systemd:
        name: auditd
        state: started
      check_mode: true
      register: lb_auditd_svc

    - name: Verify LB auditd
      assert:
        that: "lb_auditd_svc.status.ActiveState == 'active'"
        fail_msg: "auditd not running on lb-node"

    - name: Check LB kernel audit=1
      command: grep -o audit=1 /proc/cmdline
      register: lb_audit_cmdline
      changed_when: false
      failed_when: false

    - name: Verify LB audit=1
      assert:
        that: "lb_audit_cmdline.stdout == 'audit=1'"
        fail_msg: "audit=1 missing on lb-node"

    - name: Check LB journald audit socket masked
      command: systemctl is-enabled systemd-journald-audit.socket
      register: lb_jas_state
      changed_when: false
      failed_when: false

    - name: Verify LB journald audit socket masked
      assert:
        that: "lb_jas_state.stdout | trim == 'masked'"
        fail_msg: "journald-audit.socket not masked on lb-node"

    - name: Check LB journal-upload running
      systemd:
        name: systemd-journal-upload.service
        state: started
      check_mode: true
      register: lb_ju_svc

    - name: Verify LB journal-upload
      assert:
        that: "lb_ju_svc.status.ActiveState == 'active'"
        fail_msg: "journal-upload not running on lb-node"

    - name: Check LB firewall
      command: firewall-cmd --list-all
      register: fw_lb
      changed_when: false

    - name: Verify LB firewall (HAProxy 22 + mgmt 2222)
      assert:
        that:
          - "'22/tcp' in fw_lb.stdout or 'ssh' in fw_lb.stdout"
          - "'2222/tcp' in fw_lb.stdout"
        fail_msg: "LB firewall missing 22 or 2222"

    - name: Check LB root crontab
      command: crontab -l
      register: lb_crontab
      changed_when: false
      failed_when: false

    - name: Verify LB cron entries (backup-configs)
      assert:
        that: "'backup-configs' in lb_crontab.stdout"
        fail_msg: "LB backup-configs cron missing"

    - name: Validate HAProxy config
      command: haproxy -c -f /etc/haproxy/haproxy.cfg
      changed_when: false

# ── Bastion node tests ──
- name: Test bastion nodes
  hosts: bastions
  tasks:
    - name: Check SSSD running
      systemd:
        name: sssd
        state: started
      check_mode: true
      register: sssd_svc

    - name: Verify SSSD
      assert:
        that: "sssd_svc.status.ActiveState == 'active'"
        fail_msg: "SSSD not running"

    - name: Check autofs running
      systemd:
        name: autofs
        state: started
      check_mode: true
      register: autofs_svc

    - name: Verify autofs
      assert:
        that: "autofs_svc.status.ActiveState == 'active'"
        fail_msg: "autofs not running"

    - name: Check sshd running
      systemd:
        name: sshd
        state: started
      check_mode: true
      register: sshd_svc

    - name: Verify sshd
      assert:
        that: "sshd_svc.status.ActiveState == 'active'"
        fail_msg: "sshd not running"

    - name: Check sshd drop-in exists
      stat:
        path: /etc/ssh/sshd_config.d/40-bastion-auth.conf
      register: sshd_dropin

    - name: Verify sshd drop-in
      assert:
        that: "sshd_dropin.stat.exists"
        fail_msg: "sshd bastion auth drop-in missing"

    - name: Check pam-keycloak-oidc binary
      stat:
        path: /opt/pam-keycloak-oidc/pam-keycloak-oidc
      register: pam_kc

    - name: Verify pam-keycloak-oidc
      assert:
        that: "pam_kc.stat.exists and pam_kc.stat.mode == '0755'"
        fail_msg: "pam-keycloak-oidc binary missing or wrong perms"

    - name: Check LDAP user resolution via SSSD
      command: getent passwd m.bulushev
      register: getent_user
      changed_when: false

    - name: Verify LDAP user resolves
      assert:
        that: "'m.bulushev' in getent_user.stdout"
        fail_msg: "SSSD can't resolve m.bulushev from LDAP"

    - name: Check firewalld running
      systemd:
        name: firewalld
        state: started
      check_mode: true
      register: fw_svc

    - name: Verify firewalld
      assert:
        that: "fw_svc.status.ActiveState == 'active'"
        fail_msg: "firewalld not running"

    - name: Check NFS backup mount
      command: findmnt -n -o FSTYPE /mnt/backups
      register: backup_mount
      changed_when: false

    - name: Verify NFS backup mount
      assert:
        that: "backup_mount.stdout | trim == 'nfs4' or backup_mount.stdout | trim == 'nfs'"
        fail_msg: "/mnt/backups not NFS-mounted"

    - name: Check bastion auditd running
      systemd:
        name: auditd
        state: started
      check_mode: true
      register: b_auditd_svc

    - name: Verify bastion auditd
      assert:
        that: "b_auditd_svc.status.ActiveState == 'active'"
        fail_msg: "auditd not running on bastion"

    - name: Check bastion kernel audit=1
      command: grep -o audit=1 /proc/cmdline
      register: b_audit_cmdline
      changed_when: false
      failed_when: false

    - name: Verify bastion audit=1
      assert:
        that: "b_audit_cmdline.stdout == 'audit=1'"
        fail_msg: "audit=1 missing on bastion"

    - name: Check bastion journald audit socket masked
      command: systemctl is-enabled systemd-journald-audit.socket
      register: b_jas_state
      changed_when: false
      failed_when: false

    - name: Verify bastion journald audit socket masked
      assert:
        that: "b_jas_state.stdout | trim == 'masked'"
        fail_msg: "journald-audit.socket not masked on bastion"

    - name: Check bastion journal-upload running
      systemd:
        name: systemd-journal-upload.service
        state: started
      check_mode: true
      register: b_ju_svc

    - name: Verify bastion journal-upload
      assert:
        that: "b_ju_svc.status.ActiveState == 'active'"
        fail_msg: "journal-upload not running on bastion"

    - name: Check bastion oddjobd running
      systemd:
        name: oddjobd
        state: started
      check_mode: true
      register: b_oj_svc

    - name: Verify bastion oddjobd
      assert:
        that: "b_oj_svc.status.ActiveState == 'active'"
        fail_msg: "oddjobd not running on bastion"

    - name: Check authselect profile
      command: authselect current
      register: authselect_out
      changed_when: false

    - name: Verify authselect sssd with-mkhomedir
      assert:
        that:
          - "'sssd' in authselect_out.stdout"
          - "'with-mkhomedir' in authselect_out.stdout"
        fail_msg: "authselect not configured for sssd with-mkhomedir"

    - name: Check pam-keycloak-oidc loaded in sshd PAM stack
      command: grep -c pam-keycloak-oidc /etc/pam.d/sshd
      register: pam_kc_count
      changed_when: false
      failed_when: false

    - name: Verify pam-keycloak-oidc in /etc/pam.d/sshd
      assert:
        that: "pam_kc_count.stdout | int >= 1"
        fail_msg: "pam-keycloak-oidc not in /etc/pam.d/sshd"

    - name: Check pam-keycloak-oidc binary executes
      command: /opt/pam-keycloak-oidc/pam-keycloak-oidc --help
      register: pam_kc_help
      changed_when: false
      failed_when: false

    - name: Verify pam-keycloak-oidc binary runs (not blocked by linker/SELinux)
      assert:
        that: "pam_kc_help.rc != 127 and pam_kc_help.rc != 126"
        fail_msg: "pam-keycloak-oidc binary won't execute (linker / SELinux denial)"

    # ── SIS#6: custom restricted SELinux policy assertions ──
    - name: List installed SELinux modules
      command: semodule -l
      register: semodule_list
      changed_when: false

    - name: Verify custom pam_keycloak_oidc SELinux module is loaded
      assert:
        that: "'pam_keycloak_oidc' in semodule_list.stdout"
        fail_msg: "Custom SELinux module pam_keycloak_oidc is not installed"

    - name: List SELinux types defined by the custom policy
      command: seinfo -t
      register: seinfo_types
      changed_when: false

    - name: Verify custom domain + file types + port type exist
      assert:
        that:
          - "'pam_keycloak_oidc_t' in seinfo_types.stdout"
          - "'pam_keycloak_oidc_exec_t' in seinfo_types.stdout"
          - "'pam_keycloak_oidc_conf_t' in seinfo_types.stdout"
          - "'pam_keycloak_oidc_log_t' in seinfo_types.stdout"
          - "'pam_keycloak_oidc_port_t' in seinfo_types.stdout"
        fail_msg: "Custom SELinux types missing — check pam_keycloak_oidc.te"

    - name: Verify pam_keycloak_oidc_t is NOT permissive (must be enforcing)
      command: semodule --list-modules=full
      register: semodule_full
      changed_when: false

    - name: Check no permissive entry for pam_keycloak_oidc
      shell: |
        semanage permissive -l 2>/dev/null | grep -E '^pam_keycloak_oidc_t$' || true
      register: permissive_check
      changed_when: false

    - name: Assert custom domain runs in enforcing mode
      assert:
        that: "permissive_check.stdout == ''"
        fail_msg: "pam_keycloak_oidc_t is permissive — SIS#6 requires restricted enforcing rules"

    - name: Verify custom port type is bound to 8080/tcp
      command: semanage port -l
      register: semanage_ports
      changed_when: false

    - name: Assert 8080/tcp is labeled pam_keycloak_oidc_port_t
      assert:
        that: "'pam_keycloak_oidc_port_t' in semanage_ports.stdout and '8080' in (semanage_ports.stdout_lines | select('search', 'pam_keycloak_oidc_port_t') | list | join(' '))"
        fail_msg: "Port 8080/tcp is not labeled pam_keycloak_oidc_port_t"

    - name: Verify pam-keycloak-oidc binary has _exec_t label
      command: stat -c '%C' /opt/pam-keycloak-oidc/pam-keycloak-oidc
      register: stat_bin
      changed_when: false

    - name: Assert binary labeled pam_keycloak_oidc_exec_t
      assert:
        that: "'pam_keycloak_oidc_exec_t' in stat_bin.stdout"
        fail_msg: "Binary not labeled pam_keycloak_oidc_exec_t — restorecon may have failed"

    - name: Verify config file has _conf_t label
      command: stat -c '%C' /opt/pam-keycloak-oidc/pam-keycloak-oidc.tml
      register: stat_cfg
      changed_when: false

    - name: Assert config labeled pam_keycloak_oidc_conf_t
      assert:
        that: "'pam_keycloak_oidc_conf_t' in stat_cfg.stdout"
        fail_msg: "Config not labeled pam_keycloak_oidc_conf_t"

    - name: Check all 3 LDAP users resolve via SSSD
      command: getent passwd m.bulushev admin1 dba1
      register: getent_all
      changed_when: false

    - name: Verify all 3 LDAP users resolve
      assert:
        that:
          - "'m.bulushev' in getent_all.stdout"
          - "'admin1' in getent_all.stdout"
          - "'dba1' in getent_all.stdout"
        fail_msg: "Not all 3 LDAP users resolve via SSSD"

    - name: Check id command for m.bulushev
      command: id m.bulushev
      register: id_mb
      changed_when: false

    - name: Verify m.bulushev gid=2000 (bastion-users)
      assert:
        that: "'gid=2000' in id_mb.stdout"
        fail_msg: "m.bulushev not in bastion-users group"

    - name: Check id command for admin1
      command: id admin1
      register: id_a1
      changed_when: false

    - name: Verify admin1 gid=2001 (bastion-admins)
      assert:
        that: "'gid=2001' in id_a1.stdout"
        fail_msg: "admin1 not in bastion-admins group"

    - name: Check id command for dba1
      command: id dba1
      register: id_d1
      changed_when: false

    - name: Verify dba1 gid=2002 (dba)
      assert:
        that: "'gid=2002' in id_d1.stdout"
        fail_msg: "dba1 not in dba group"

    - name: Check Keycloak well-known reachable from bastion
      uri:
        url: http://192.168.56.20:8080/realms/bastion/.well-known/openid-configuration
        return_content: false
        status_code: 200
      register: kc_from_bastion

    - name: Verify Keycloak well-known returns 200
      assert:
        that: "kc_from_bastion.status == 200"
        fail_msg: "Keycloak well-known endpoint not reachable from bastion"

    - name: Check bastion firewall (all zones, including rich rules)
      command: firewall-cmd --list-all-zones
      register: fw_bastion
      changed_when: false

    - name: Verify bastion firewall allows SSH (rich rule or port)
      assert:
        that:
          - "'port=\"22\"' in fw_bastion.stdout or '22/tcp' in fw_bastion.stdout"
        fail_msg: "Bastion firewall missing SSH (no port=22 rich rule and no 22/tcp)"

    - name: Check bastion root crontab
      command: crontab -l
      register: bastion_crontab
      changed_when: false
      failed_when: false

    - name: Verify bastion cron entries (backup-configs)
      assert:
        that: "'backup-configs' in bastion_crontab.stdout"
        fail_msg: "Bastion backup-configs cron missing"

# ── Target server tests ──
- name: Test test-server
  hosts: target
  tasks:
    - name: Check dedicated disk mount
      command: findmnt -n -o FSTYPE /var/lib/pgsql
      register: pg_mount
      changed_when: false

    - name: Verify PostgreSQL data disk
      assert:
        that: "pg_mount.stdout | trim == 'xfs'"
        fail_msg: "/var/lib/pgsql not XFS-mounted"

    - name: Check PostgreSQL running
      systemd:
        name: postgresql-16
        state: started
      check_mode: true
      register: pg_svc

    - name: Verify PostgreSQL
      assert:
        that: "pg_svc.status.ActiveState == 'active'"
        fail_msg: "PostgreSQL 16 not running"

    - name: Check dba1 role exists
      shell: sudo -u postgres /usr/pgsql-16/bin/psql -tAc "SELECT 1 FROM pg_roles WHERE rolname='dba1'"
      register: dba_role
      changed_when: false

    - name: Verify dba1 role
      assert:
        that: "'1' in dba_role.stdout"
        fail_msg: "PostgreSQL dba1 role missing"

    - name: Check firewalld running
      systemd:
        name: firewalld
        state: started
      check_mode: true
      register: fw_svc

    - name: Verify firewalld
      assert:
        that: "fw_svc.status.ActiveState == 'active'"
        fail_msg: "firewalld not running"

    - name: Check NFS backup mount
      command: findmnt -n -o FSTYPE /mnt/backups
      register: backup_mount
      changed_when: false

    - name: Verify NFS backup mount
      assert:
        that: "backup_mount.stdout | trim == 'nfs4' or backup_mount.stdout | trim == 'nfs'"
        fail_msg: "/mnt/backups not NFS-mounted"

    - name: Check target auditd running
      systemd:
        name: auditd
        state: started
      check_mode: true
      register: t_auditd_svc

    - name: Verify target auditd
      assert:
        that: "t_auditd_svc.status.ActiveState == 'active'"
        fail_msg: "auditd not running on test-server"

    - name: Check target kernel audit=1
      command: grep -o audit=1 /proc/cmdline
      register: t_audit_cmdline
      changed_when: false
      failed_when: false

    - name: Verify target audit=1
      assert:
        that: "t_audit_cmdline.stdout == 'audit=1'"
        fail_msg: "audit=1 missing on test-server"

    - name: Check target journald audit socket masked
      command: systemctl is-enabled systemd-journald-audit.socket
      register: t_jas_state
      changed_when: false
      failed_when: false

    - name: Verify target journald audit socket masked
      assert:
        that: "t_jas_state.stdout | trim == 'masked'"
        fail_msg: "journald-audit.socket not masked on test-server"

    - name: Check target journal-upload running
      systemd:
        name: systemd-journal-upload.service
        state: started
      check_mode: true
      register: t_ju_svc

    - name: Verify target journal-upload
      assert:
        that: "t_ju_svc.status.ActiveState == 'active'"
        fail_msg: "journal-upload not running on test-server"

    - name: Check target firewall (all zones, including rich rules)
      command: firewall-cmd --list-all-zones
      register: fw_target
      changed_when: false

    - name: Verify target firewall allows PostgreSQL 5432
      assert:
        that: "'port=\"5432\"' in fw_target.stdout or '5432/tcp' in fw_target.stdout"
        fail_msg: "Target firewall missing 5432 (no rich rule and no port)"

    - name: Check target postgres crontab
      command: crontab -u postgres -l
      register: target_pg_crontab
      changed_when: false
      failed_when: false

    - name: Verify backup-postgres cron present
      assert:
        that: "'backup-postgres' in target_pg_crontab.stdout"
        fail_msg: "backup-postgres cron missing for postgres user"

    - name: Check target root crontab
      command: crontab -l
      register: target_root_crontab
      changed_when: false
      failed_when: false

    - name: Verify backup-configs cron present
      assert:
        that: "'backup-configs' in target_root_crontab.stdout"
        fail_msg: "backup-configs cron missing for root"

    - name: PostgreSQL backup smoke
      block:
        - name: Trigger pg_dumpall backup
          shell: |
            sudo -u postgres bash -c '/usr/pgsql-16/bin/pg_dumpall | gzip > /mnt/backups/postgres/pg-test-{{ lookup("pipe", "date +%s") }}.sql.gz'
          changed_when: false

        - name: Verify pg_dumpall backup is recoverable
          shell: |
            f=$(ls -t /mnt/backups/postgres/pg-test-*.sql.gz | head -1)
            test -s "$f" || exit 1
            gunzip -t "$f" || exit 1
            gunzip -c "$f" | head -50
          register: pg_dump_head
          changed_when: false

        - name: Assert pg backup contains SQL content
          assert:
            that:
              - "pg_dump_head.stdout is search('CREATE ROLE') or pg_dump_head.stdout is search('SET ')"
            fail_msg: "pg backup doesn't contain expected SQL"
      always:
        - name: Cleanup pg backup smoke artifact
          shell: rm -f /mnt/backups/postgres/pg-test-*.sql.gz
          changed_when: false

# ── Cross-cutting: central log collector has every host ──
- name: Verify central journal contains every fleet host
  hosts: storage
  tasks:
    - name: List hostnames in remote journal
      shell: journalctl -D /var/log/journal/remote -F _HOSTNAME 2>/dev/null | sort -u
      register: remote_hosts
      changed_when: false

    - name: Verify all clients have shipped journal entries
      assert:
        that:
          - "'idp-node' in remote_hosts.stdout"
          - "'lb-node' in remote_hosts.stdout"
          - "'bastion-01' in remote_hosts.stdout"
          - "'bastion-02' in remote_hosts.stdout"
          - "'test-server' in remote_hosts.stdout"
        fail_msg: "Remote journal missing hosts. Found: {{ remote_hosts.stdout }}"

# ── Cross-cutting: end-to-end audit smoke ──
# Note: file watches (-w ... -p x) are loaded into auditctl but the
# kernel does not fire SYSCALL events for them on this Fedora build.
# PAM-emitted events (USER_CMD, USER_LOGIN, CRED_*) DO fire and flow
# end-to-end, so we use a sudo invocation as the trigger and verify
# that audisp-syslog events from each shipper reach the collector.
- name: Trigger audisp-syslog event on every shipper
  hosts: idp:lb:bastions:target
  tasks:
    - name: Run trivial sudo command to fire USER_CMD audit event
      command: /bin/true
      changed_when: false

- name: Verify audit events landed on the central collector
  hosts: storage
  tasks:
    - name: Allow journal-upload to flush
      pause:
        seconds: 6

    - name: List hostnames with audisp-syslog events in last 10 min
      shell: |
        journalctl -D /var/log/journal/remote --since "10 minutes ago" \
          SYSLOG_IDENTIFIER=audisp-syslog -o short-iso --no-pager 2>/dev/null \
          | awk '{print $2}' \
          | sort -u
      register: audit_hosts_query
      changed_when: false

    - name: Verify audisp-syslog events from every non-storage host
      assert:
        that:
          - "'idp-node' in audit_hosts_query.stdout"
          - "'lb-node' in audit_hosts_query.stdout"
          - "'bastion-01' in audit_hosts_query.stdout"
          - "'bastion-02' in audit_hosts_query.stdout"
          - "'test-server' in audit_hosts_query.stdout"
        fail_msg: "Missing audisp-syslog events from one or more hosts. Got: {{ audit_hosts_query.stdout }}"

# ── Monitoring stack: Node Exporter + Promtail containers on every host ──
# Excludes the hypervisor — it's not a fleet host, just runs the laptop-side
# port forwarder, and doesn't have the secos rootless stack.
- name: Test monitoring agents on all hosts
  hosts: all:!hypervisor
  tasks:
    # Rootless user unit under secos@. See secos-idp note above.
    - name: Check secos-agents rootless user unit running
      command: systemctl --user --machine=secos@.host is-active secos-agents.service
      register: agents_svc
      changed_when: false
      failed_when: false

    - name: Verify secos-agents active
      assert:
        that: "agents_svc.stdout | trim == 'active'"
        fail_msg: "secos-agents not running on {{ inventory_hostname }}: {{ agents_svc.stdout }}"

    - name: Scrape node_exporter /metrics
      uri:
        url: http://127.0.0.1:9100/metrics
        return_content: true
        status_code: 200
      register: ne_metrics
      retries: 10
      delay: 3
      until: ne_metrics.status == 200

    - name: Verify node_exporter emits node_* metrics
      assert:
        that: "'node_cpu_seconds_total' in ne_metrics.content"
        fail_msg: "node_exporter /metrics missing node_cpu_seconds_total"

    - name: Promtail /ready
      uri:
        url: http://127.0.0.1:9080/ready
        status_code: 200
      register: pt_ready
      retries: 5
      delay: 3
      until: pt_ready.status == 200

    - name: Promtail /metrics exposes send-batch counter
      uri:
        url: http://127.0.0.1:9080/metrics
        return_content: true
        status_code: 200
      register: pt_metrics

    - name: Verify promtail has shipped at least one batch to Loki
      assert:
        that: "pt_metrics.content is search('promtail_sent_bytes_total')"
        fail_msg: "promtail has no promtail_sent_bytes_total metric on {{ inventory_hostname }}"

# ── Monitoring stack: Prometheus / Loki / Grafana containers on storage-node ──
- name: Test central monitoring stack on storage-node
  hosts: storage
  tasks:
    # Rootless user unit under secos@. See secos-idp note above.
    - name: Check secos-monitoring rootless user unit running
      command: systemctl --user --machine=secos@.host is-active secos-monitoring.service
      register: mon_svc
      changed_when: false
      failed_when: false

    - name: Verify secos-monitoring active
      assert:
        that: "mon_svc.stdout | trim == 'active'"
        fail_msg: "secos-monitoring not running: {{ mon_svc.stdout }}"

    - name: Prometheus /-/healthy
      uri:
        url: http://127.0.0.1:9090/-/healthy
        status_code: 200

    - name: Prometheus /-/ready
      uri:
        url: http://127.0.0.1:9090/-/ready
        status_code: 200
      register: prom_ready
      retries: 5
      delay: 3
      until: prom_ready.status == 200

    - name: Query Prometheus active targets
      uri:
        url: http://127.0.0.1:9090/api/v1/targets?state=active
        return_content: true
      register: prom_targets

    - name: List down targets
      set_fact:
        down_targets: >-
          {{ prom_targets.json.data.activeTargets
             | rejectattr('health','equalto','up')
             | map(attribute='scrapeUrl') | list }}

    - name: Verify all Prometheus scrape targets are up
      assert:
        that: "down_targets | length == 0"
        fail_msg: "Prometheus targets down: {{ down_targets }}"

    - name: Verify Prometheus scrapes every fleet host (node_exporter)
      assert:
        that: >-
          (prom_targets.json.data.activeTargets
             | selectattr('labels.job','equalto','node')
             | map(attribute='labels.instance') | list
             | length) >= 6
        fail_msg: "Prometheus 'node' job missing instances (got {{ prom_targets.json.data.activeTargets | selectattr('labels.job','equalto','node') | map(attribute='labels.instance') | list }})"

    - name: Loki /ready
      uri:
        url: http://127.0.0.1:3100/ready
        status_code: 200
      register: loki_ready
      retries: 10
      delay: 6
      until: loki_ready.status == 200

    - name: Loki /metrics responds
      uri:
        url: http://127.0.0.1:3100/metrics
        status_code: 200

    - name: Query Loki label values for 'host'
      uri:
        url: "http://127.0.0.1:3100/loki/api/v1/label/host/values"
        return_content: true
      register: loki_hosts

    - name: Verify Loki has received logs from every host
      assert:
        that:
          - "'storage-node' in (loki_hosts.json.data | default([]))"
          - "'idp-node' in (loki_hosts.json.data | default([]))"
          - "'lb-node' in (loki_hosts.json.data | default([]))"
          - "'bastion-01' in (loki_hosts.json.data | default([]))"
          - "'bastion-02' in (loki_hosts.json.data | default([]))"
          - "'test-server' in (loki_hosts.json.data | default([]))"
        fail_msg: "Loki missing hosts. Got: {{ loki_hosts.json.data | default([]) }}"

    - name: Grafana /api/health
      uri:
        url: http://127.0.0.1:3000/api/health
        return_content: true
        status_code: 200
      register: graf_health
      retries: 10
      delay: 3
      until: graf_health.status == 200

    - name: Verify Grafana database healthy
      assert:
        that: "graf_health.json.database == 'ok'"
        fail_msg: "Grafana database not ok: {{ graf_health.json }}"

    - name: Read Grafana admin password
      slurp:
        src: /var/lib/secos/secos/monitoring/grafana/admin_password
      register: graf_admin
      no_log: true

    - name: Grafana datasources are configured
      uri:
        url: http://127.0.0.1:3000/api/datasources
        user: admin
        password: "{{ graf_admin.content | b64decode }}"
        force_basic_auth: true
        return_content: true
        status_code: 200
      register: graf_ds
      failed_when: false
      no_log: true

    - name: Verify Prometheus + Loki datasources present (if API reachable)
      assert:
        that:
          - "graf_ds.json | selectattr('type','equalto','prometheus') | list | length >= 1"
          - "graf_ds.json | selectattr('type','equalto','loki') | list | length >= 1"
        fail_msg: "Grafana missing datasource(s): {{ graf_ds.json | map(attribute='type') | list }}"
      when: graf_ds.status is defined and graf_ds.status == 200
