[storage]
storage-node ansible_host=192.168.56.50

[idp]
idp-node ansible_host=192.168.56.20

[lb]
lb-node ansible_host=192.168.56.10 ansible_port=2222

[bastions]
bastion-01 ansible_host=192.168.56.11
bastion-02 ansible_host=192.168.56.12

[target]
test-server ansible_host=192.168.56.60

# Local hypervisor — runs the host-side TCP forwarder (laptop -> hypervisor -> storage Grafana).
# Connects via local connection so it operates on the workstation running ansible itself.
[hypervisor]
host-pc ansible_connection=local ansible_python_interpreter="{{ ansible_playbook_python }}"

[all:vars]
ansible_user=vagrant
ansible_password=vagrant
