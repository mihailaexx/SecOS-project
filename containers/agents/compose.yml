services:
  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.11.1
    container_name: node-exporter
    hostname: "${HOSTNAME}-node-exporter"
    restart: on-failure
    network_mode: host
    pid: host
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
      - label=type:container_t
    user: "65534:65534"
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host/root
      - --web.listen-address=0.0.0.0:9100
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro,rslave
    tmpfs:
      - /tmp:size=16m,mode=1777
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9100/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: journald
      options:
        tag: node-exporter

  promtail:
    image: docker.io/grafana/promtail:3.6.10
    container_name: promtail
    hostname: "${HOSTNAME}-promtail"
    restart: on-failure
    network_mode: host
    read_only: true
    cap_drop: [ALL]
    cap_add: [DAC_READ_SEARCH]
    # Promtail reads journald (syslogd_var_run_t, var_log_t), which container_t
    # is denied. Disable SELinux confinement on this container — it is a trusted
    # log shipper whose whole purpose is reading host logs.
    security_opt:
      - no-new-privileges:true
      - label=disable
    user: "0:0"
    command: ["-config.file=/etc/promtail/config.yml", "-config.expand-env=true"]
    environment:
      HOSTNAME: "${HOSTNAME}"
      LOKI_URL: "${LOKI_URL:-http://192.168.56.50:3100/loki/api/v1/push}"
    volumes:
      - /etc/secos/promtail/config.yml:/etc/promtail/config.yml:ro,Z
      - /var/log/journal:/var/log/journal:ro
      - /run/log/journal:/run/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      - promtail-positions:/var/lib/promtail:Z
    tmpfs:
      - /tmp:size=16m,mode=1777
    logging:
      driver: journald
      options:
        tag: promtail

volumes:
  promtail-positions:
    name: promtail-positions
