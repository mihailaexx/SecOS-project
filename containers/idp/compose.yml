services:
  openldap:
    image: docker.io/bitnamilegacy/openldap:latest
    container_name: openldap
    hostname: openldap
    restart: on-failure
    security_opt:
      - seccomp=unconfined
      - label=type:container_t
    ports:
      - "389:1389"
    environment:
      LDAP_ROOT: dc=bastion,dc=local
      LDAP_ADMIN_USERNAME: admin
      LDAP_ADMIN_PASSWORD: admin
      LDAP_PORT_NUMBER: "1389"
      LDAP_ENABLE_TLS: "no"
      LDAP_CUSTOM_LDIF_DIR: /ldifs
      LDAP_SKIP_DEFAULT_TREE: "yes"
    volumes:
      - /etc/secos/openldap/ldifs:/ldifs:ro,Z
      - openldap-data:/bitnami/openldap:Z
    healthcheck:
      test: ["CMD-SHELL", "ldapsearch -H ldap://127.0.0.1:1389 -x -b 'dc=bastion,dc=local' -s base >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: journald
      options:
        tag: openldap

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.4
    container_name: keycloak
    hostname: keycloak
    restart: on-failure
    user: "1000:1000"
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
      - label=type:container_t
    depends_on:
      - openldap
    ports:
      - "8080:8080"
      - "9000:9000"
    environment:
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: "8080"
      KC_HOSTNAME: idp-node.bastion.local
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
      KC_DB: dev-file
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    command: ["start-dev", "--import-realm"]
    volumes:
      - /etc/secos/keycloak/import:/opt/keycloak/data/import:ro,Z
      - keycloak-data:/opt/keycloak/data:Z
    tmpfs:
      - /tmp:size=128m,mode=1777
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /health/ready HTTP/1.0\\r\\n\\r\\n' >&3 && grep -q '\"status\": \"UP\"' <&3"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    logging:
      driver: journald
      options:
        tag: keycloak

volumes:
  openldap-data:
    name: openldap-data
  keycloak-data:
    name: keycloak-data
