services:
  prometheus:
    image: docker.io/prom/prometheus:v3.11.2
    container_name: prometheus
    hostname: prometheus
    restart: on-failure
    user: "65534:65534"
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
      - label=type:container_t
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.listen-address=0.0.0.0:9090
    volumes:
      - /etc/secos/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro,Z
      - prometheus-data:/prometheus:Z
    tmpfs:
      - /tmp:size=64m,mode=1777
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/-/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: journald
      options:
        tag: prometheus

  loki:
    image: docker.io/grafana/loki:3.7.1
    container_name: loki
    hostname: loki
    restart: on-failure
    user: "10001:10001"
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
      - label=type:container_t
    ports:
      - "3100:3100"
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - /etc/secos/loki/config.yml:/etc/loki/config.yml:ro,Z
      - loki-data:/var/lib/loki:Z
    tmpfs:
      - /tmp:size=64m,mode=1777
    logging:
      driver: journald
      options:
        tag: loki

  grafana:
    image: docker.io/grafana/grafana:13.0.1
    container_name: grafana
    hostname: grafana
    restart: on-failure
    user: "472:472"
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
      - label=type:container_t
    depends_on:
      - prometheus
      - loki
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_SERVER_ROOT_URL: "http://storage-node:3000/"
    volumes:
      - /etc/secos/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro,Z
      - /etc/secos/grafana/dashboards-provider.yml:/etc/grafana/provisioning/dashboards/dashboards-provider.yml:ro,Z
      - /etc/secos/grafana/dashboards:/var/lib/grafana/dashboards:ro,Z
      - grafana-data:/var/lib/grafana:Z
    tmpfs:
      - /tmp:size=64m,mode=1777
    secrets:
      - grafana_admin
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: journald
      options:
        tag: grafana

volumes:
  prometheus-data:
    name: prometheus-data
  loki-data:
    name: loki-data
  grafana-data:
    name: grafana-data

secrets:
  grafana_admin:
    file: /etc/secos/grafana/admin_password
